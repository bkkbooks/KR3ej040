body:
  text: 下卷錢氏經驗良方初生訣小兒生下一月餘有病如何為分別男左女右虎口看若還紫紋胎驚熱青色受胎氣不全亦有驚多積蓄掣青色必因數日前皆因蹼跌顛孩兒一歲至三歲虎口脈內看兩邊若還一關長一米定是驚風傳候起半寸病因是驚傳先須用藥鎮心裡若過第二第三關並同驚積一般說似出不出隱隱紋此乃驚傳脾藏絶若還紫色難醫療青色其驚入脾竅此病呼作慢驚風好手醫人急須療或紅顏色便心寬用藥之時立見安脈過三關連指面孩兒死後立須見不拘顏色赤白紅十死一生休怨嘆二三歲時看虎口更用中指按高骨浮即生風數即驚緊是顛癇風作熱沉細腹痛緩沉虛瀉痢皆因此脈初微遲有積兼蟲盛遲澀元來胃脘虛四歲脈不在指端一指高骨按虛實五六袞轉尋三部平正關上為準則七八稍多指稍許九十次第八位取十一十二也全看十四十五三指數小兒有病脈不多先定浮沉遲數數沉遲為陰浮為陽更看面部屬何方青色驚風白虛瀉赤色痰熱黑難當黃是脾家因有積醫人審度用良方小兒脈緊風癇候沉緩食傷多吐嘔弦緊因知氣不和緩急虛驚神不守冷則沉細風則浮牢實大便因祕久腹痛之候緊而弦此是胃寒宜療救變蒸之時脈亦變不治自然無過謬單細疳勞洪有蟲大小不均為惡候脈遲而澀有寒熱此是胃寒分別嘔瀉痢浮弦不可醫仔細思量宜審究小兒脈浮多風熱沉細原因乳食結弦長多是肝膈風緊數驚風四肢掣洪浮胃口似火燒沉緊胃中痛不歇虛濡有驚又兼驚脈乳大小便中血四至洪來苦煩滿沉細腹中痛切切滑主露濕冷所傷弦緊容忤分明說五指尖頭冷驚來不可當若逢中指熱必定是傷寒中指獨自冷痘疹症相傳男左女右分脈紋仔細看看指虎口脈色法紫熱紅傷風青驚白色疳黑色因中毒黃色因脾端身冷熱驗症歌鼻冷知痘疹耳冷緣傷風熱症渾身熱乍熱是傷脾囟門高起脈來洪大而有力渾身壯熱日夜不寧者是傷風寒宜用發表之劑囟門高起脈來緊大而軟身體不熱唇紅口乾乃是內熱或有驚悸宜抱龍丸治之乍涼乍熱肚腹膨脹大小便不通者下之如大小便照常者保和丸主之口乾發渴大便泄瀉小便赤短者胃苓丸主之囟門陷下肚腹膨脹不思乳食乃是傷寒宜用香砂保安丸治之傷風惡風發熱頭應痛兩頰微紅鼻涕多汗出遍身兼咳嗽此是傷風症易和傷寒傷寒之候有多般一概推詳便覺難面目俱紅時噴嚏氣粗身熱是傷寒夾食鼻涕頭痛時吐逆面黃紅白帶不一此因夾食又傷寒發表有功方下積夾驚身微有熱生煩躁睡不安兮神不清此是夾驚感寒症亦須先表次寧心傷風之症鼻流清涕身常有汗咳嗽不寧兩頰微紅宜用前胡半夏丸治之傷寒之症遍身大熱氣粗喘急宜用羌活膏表之夾食者目胞微浮吐逆臆氣吞酸身熱頭痛鼻塞心煩發渴腹痛而膨宜用羌活膏次用香砂保安丸香橘餅之類治之夾驚者或被驚發熱又感寒邪或先感寒邪而後受驚兩熱相乘故神思昏沉渴而煩躁咬牙呵缺目直手動面有青紫色宜用羌活膏次抱龍丸金箔鎮心丸之類選而用之痰咳嗽雖然分涼熱連聲因肺感風寒眼浮痰盛喉中響戲水多因汗未乾傷風咳嗽者前已有治矣若微熱而咳者抱龍丸以去痰瀉白散以平肺若痰涎壅盛白玉餅子下之或滾痰丸亦可其內熱發渴咳嗽不已喘喉中痰響者治之天竺黃丸積頭痛身熱膨脹足冷神昏只愛眠因食所傷脾氣弱不宜遲緩健脾丸積聚之症不同其發有常處其痛不離其部或胸前脅下或左或右有物堅硬按之礙手者為積其發無根本上下有所留止其痛無常處者為聚皆面發焦黃昏困多睡兩目黃赤面目虛腫乳食漸減身體肌瘦宜五疳消積丸挨積丸香砂保安丸之類痢小兒下痢細尋推不獨成於積所為冷熱數般雖各異寬腸調胃在明醫痢症皆於冷熱不調飲食積滯不能運化而成大要分陰陽行滯氣消積消熱補脾開胃進食為主蓋陰陽一分陽胃自厚故香連胃苓膏先服之其元氣未虛裡急後重欲出而不出者以大承氣湯木香檳榔丸妙應丸下之純白者胃苓湯加黃連芍藥枳殼砂仁治之純紅者胃芩湯加當歸芍藥生地黃黃連黃芩滑石山楂枳殼等治之要以涼血活血為主此後略加地榆借意而止之為妙吐脾虛胃弱病根源水穀如何運化行清濁相干成吐瀉久傳虛渴便成生小兒吐症皆脾胃虛怯或過傷冷熱所致是胃氣不和則逆而上行故作嘔吐嘔者有物有聲乾嘔則無物矣吐者有物無聲其症不同有熱有冷有虛有痰有食當詳辨之熱吐者或感驚而心熱或感暑氣而脾熱或飲熱乳而胃熱吐有黃涎而夾乳食成片者頭額溫熱五心熱小便短赤者是用五苓散加生薑及抱龍丸香薷飲天水散等去驚清熱清暑之藥寒吐者或冒風寒或寒時就與乳吃冷氣入胃吐必夾乳食或夾清水白沫四肢淒冷面白喜熱惡寒者是治用藿香正氣散加木香四君子湯加陳皮丁香乾薑之藥其或面有青氣則肝來克脾急用附子理中湯加炮姜量小兒虛實以治虛吐者肌弱神困面白脾胃久虛或源患疳積及節次傷乳食胃氣衰寒不能停蓄飲而即吐治用實脾化痰溫胃木香餅參苓白朮散助胃丸等施之痰吐者傷風痰塞咳嗽氣急或身發熱面色青紅此因有風生痰痰積日久膈於中脘遂令乳食不化不下故咳嗽連聲氣逆上塞即便吐出治法先與化痰定心服天竺地黃丸抱龍丸後用解表惺惺散寧嗽補脾潤肺之藥治之食吐者因過傷乳食吐出酸水或宿乳食不消蓋胃氣不和物積不化所為滿而溢者必肚腹發熱作痛面額熱時作噯氣治先消其食用妙應丸挨積丸保和丸之類愈後用助胃丸參苓白朮散等調理之瀉瀉症有五曰溏曰泄曰滑曰痢曰洞俱當分別溏者糟粕不聚似瀉非瀉泄者無時無度或出不知稀薄如水痢者氣從中脘下奔直射濺溜如卒筒然滑者水穀不化腸胃直過洞者頓然大下如桶傾水凡此皆脾胃不調或寒或熱或過傷乳食或素有蟲積所致如大便黃赤有沫糞出射遠此熱也宜五苓散天水散分其陰陽後平胃氣如面青唇白眼輪紫黑糞白或青手足冷未瀉時先腹痛叫哭此寒也宜木香餅助胃丸調其胃氣參苓白朮散補之五苓散分利之瀉下臭穢如抱退雞子肚腹膨脹其手脈紋紫身熱此裡實有食積宜妙應丸治之後與調補如瀉出青色乳片不化小便短少面色青紅或糞腥臭自傷乳食也夾驚也宜先與清寧散抱龍丸去驚後五苓散胃苓膏利小水後錢氏白朮散溫補之暑月作瀉清水口發渴小便短少此傷暑熱也宜天水散五苓散錢氏白朮散香薷飲之類面紅卒腫渾身熱唇黑牙關氣如絶自播搐搦喉有痰此是急驚容易決陰盛陽虛病已深吐余瀉後睡揚睛神昏搐緩涎留甚此症分明是慢驚急驚受病之源皆因其母平日恣食辛辣熱物厚衣暖室閉藏太過致使熱盛生痰痰盛生驚驚盛生風四症既具則變為八候蓋風盛則兩手伸縮而成搐搐盛則十指開合而成搦搦盛則熱如相撲而成掣掣盛則頭搖不定或偏而成顫顫則身仰向後而為反反則臂若開弓而為引引則兩目或上視邪視直視而為竄竄則睛露不動而為視所為八候者其類俱牙關緊急痰如拽鋸手足拳攣張口出舌唇紅臉赤或滿面俱青唇青瀉青虎口脈紋紅紫或青者皆急驚也此症積於平時發於頃刻最能駭人然專屬心肝二經乃風火相搏之故必先去痰瀉肝後清心利小水定驚安神養脾方無變症宜用瀉肝散天竺黃丸滾痰丸牛黃清心丸琥珀抱龍丸參苓白朮散等施治無不愈者但當辨認搐之順逆蓋男搐左視左女搐右視右為順反者為逆如發逆症者金木相戰也俱當瀉肺湯以瀉肺地黃丸以補腎瀉肝散涼驚丸以瀉心肝又當採其氣之冷熱如氣冷不乳者難治氣熱能乳者雖搐不妨至於慢驚則或吐或瀉涎鳴微喘眼開神緩目慢露睛昏睡跳搐搦似有似無乍發乍止口開臭氣冷或身熱或冷脈紋透關皆因吐瀉之後脾胃虧損元氣虛弱及下吐太多所致唯當醒脾溫胃之中加以截風化痰之藥宜醒脾散惺惺散參苓白朮散附子理中湯蘇合香丸之類疳五疳五臟五般看治法推詳事不難若見面黃肌肉瘦齒焦發豎即為疳疳之為病所得不同或乳食不調過餐甘肥或缺乳食物大早或乳母喜怒房勞即與乳吃或飲有娠之乳大抵皆脾胃受病內無津液之故又有因病服吐下表散之藥先後失宜為醫所誤而得者皆當詳其五臟所主而用藥如身體壯熱臉赤唇紅口舌生瘡胸膈煩悶小便赤澀五心煩熱盜汗發渴多哭者在心頭焦發立筋青腦熱躁渴多汗下痢疥癬者在肝胸熱肌消手足冰冷寒熱時來滑泄肚疼牙疳口臭尿黃多渴者在腎咳嗽喘逆發熱惡寒皮膚粟起鼻癢流涕者在肺面黃身黃肚大腳細吐逆身滿乏力啼哭水穀不化泄下酸臭合面困睡搭口發豎者在脾至如肚大青筋如吃泥土並雜物茶米沙炭之類肚腹膨大釀乳洞泄骨蒸潮熱尿如米泔上下蟲出羞明雀目俱是疳症此皆脾家受病傳入諸臟惟先理脾氣則諸臟皆安故總用五疳保童丸消疳肥兒丸木香蘆薈丸有蟲者追蟲丸使君子丸牙疳者人中白散雞金散次第用之又吐論熱寒虛痰食五吐解見於前凡未周小兒吐奶最為重病吐奶必夾痰三吐之後胃氣即虛虛則外風乘入內外夾攻痰涎愈生而閉於胃脘胃脘閉而四肢關亦閉遂發驚搐或慢驚等症如手足搐搦口眼翻脹頭額強舉不可名狀往往用藥無效故此乳要預先治之如吐成乳片者是胃熱熱盛生痰久則成風矣必先與清胃化痰定吐之劑若吐久則胃久虛寒尤宜溫補不可熱一如鼻有青色夜間煩躁身熱是客風傷肺也先宜發表然後止吐如唇口黑色多哭喉中作聲是傷脾宜調脾止吐如吐出夾清水面青唇白是胃寒宜溫胃木香餅助胃丸之類如早夜發熱不睡多啼則將發驚矣急宜調胃補胃補脾人參溫中之藥參苓白朮散緩驚餅子鎮驚丸調中正氣等劑治之切莫孟浪可也泄瀉泄瀉之症皆脾胃不調或寒或熱或過傷乳食或素有蟲積所致若面色痿黃肚脹腳細弱頭大項小肌肉消瘦貪餐妒食瀉出或黃或白或稀或稠其臭異常其瀉有時或二日三日一次腹似蜘蛛瀉去頗軟自瀉自止此釀瀉也釀者如酒之意皆疳積為病宜蘆薈丸肥兒丸多服後調脾自安若瀉出青緑色者此肝來侮脾將發驚也若初瀉出色黃良久變而為青乃脾虛而受制於肝也此等症三五次即困乏治之稍緩即成慢驚風急先溫其臟氣調其胃氣平順三焦和正榮衛如瀉不能止且先投其補脾益黃散參苓白朮散加肉豆蔻訶子之藥止之後徐調理若困乏四肢厥冷目無睛光鼻中乾燥則逆症也附子理中湯之類宜酌量用之如遲過投熱藥瀉止則痢作無疑矣須當詳審又有吐瀉並作者身體壯熱不思乳食大便白色或所出物不化此傷食也當先消導之後與助胃調脾若身溫或冷不思乳食大便青白色乳食不化此上實下虛尤當兼其所現之症治之大要補脾益黃散參苓白朮散為先也又有吐瀉並作身熱多睡吐痰咳嗽能食乳大便稀黃渴欲飲水胃虛而有風熱之故當先與白朮散生胃中津液以止其渴後以抱龍丸發散風熱更服養脾胃之劑痢症痢症不同非有積滯終不能成須當辨其致病之由大要分陰陽行滯氣消積消熱補脾開胃進食為主蓋陰陽一分腸胃自厚故五苓散胃苓湯必先服之一二日間元氣未虛者以大承氣湯下之此通因通用之法切不可驟用補藥亦不可用澀藥至變作禁口刮腸等痢為害非淺冷痢者脾胃虛寒停滯物冷不化遂下或青或白凍沫夾水腹痛者是也治宜胃苓湯加白芍藥理中湯參苓白朮散胃風湯木香餅之類屢效熱痢者胃中濕熱凝蓄不散乘於血分而散於大腸故下或赤或黃腥臭或多或少腹中窘痛裡急後重或身發熱噁心口渴不思飲食者是也宜五苓散加車前子次香連丸芍藥甘草湯不換金正氣散人參赤茯苓薑棗後以參苓白朮散調補無不愈者疳痢者過餐冷肥甘油膩之物或乳食並進其下黃白色腹不痛下無時度或二三日一次或一日數次貪食妒食目無睛光肌肉羸瘦發漸脫落者是也治宜香連丸木香肥兒丸參苓白朮散之類驚痢者因驚積熱傳入臟腑故印堂眉面觀病之間俱有青色其下青多黃少或如苔蘚或如痰涎睡中多哭者是也宜五苓散加木通或一散利其小便後以胃苓湯去桂並抱龍丸香連丸緩驚紅餅子治之冷熱不調者因腸胃間或傷冷熱或晝涼夜熱氣急發渴目胞浮腫肚腹脹硬其下赤白不一或兼青白或如魚腦酸臭或稀散成凍或純水交集惡食者是也治宜五苓散胃風湯或消積丸下之下後五苓散加黃連白芍藥枳殼治之仍以錢氏白朮散調自愈純血痢者糞少血多色鮮或紫或黯午後身微熱或能食或不能食服止痢止血之藥不效者此脾家受病已深脾病而肺亦病遂不能統制其血聽其乘入大腸之故治當消食補脾啓脾丸消積丸保和丸白朮散之類加以黃芩當歸白芍滑石山楂神麯麥牙陳皮枳殼等藥治之又有風邪下陷者升提之大要以涼血活血為主此略加地榆少許借意而止之為妙如發熱者更加黃芩少加黃連血虛者四物湯元氣形體羸弱者參苓白朮散調補之大概先水瀉後痢者難愈先痢後瀉者易愈脈微小者易治浮洪數大者難治懸絶者死滑者生瘧症瘧症不一有痰食勞暑鬼障寒溫濕牝痰之症不同六經五臟三陰之各一有一日一發二日一發有間一日一發有間二日一發有日與夜各發有上半日發有下半日發及或發於夜者有有汗有無汗者先寒後熱者先熱後寒者皆當詳辨而治之如胸膈有痰心下脹滿氣逆煩嘔此痰瘧也二陳湯加柴胡黃芩枳實之類治之胸膈不和肚腹疼痛吞酸噯氣吐水此食瘧也和中保安丸加青皮柴胡檳榔並五苓散異功散之類治之病愈未久表裡俱虛客邪未散真氣不復過勞即發此勞瘧也宜補中益氣湯四君子湯少加柴胡鱉甲治之面垢口渴小便赤大便祕肌熱額熱微微汗出及上半身汗此暑瘧也十味香薷飲五苓散治之進退無時作止不一或單熱此鬼瘧也鬼哭散截瘧丹清脾飲治之寒熱往來或上半日或申酉時噁心乾嘔此瘴瘧也四獸飲治之若纏延日久不愈者則兩脅之間結成癖積名曰瘧毋此皆初發時失於解表內傷飲食外感風邪所成治宜鱉甲飲四獸飲歸脾湯主之但先寒後熱者名寒瘧先熱後寒者名溫瘧身重熱骨節痛腹脹滿自汗善嘔名濕瘧但寒不熱者名牝瘧皆因正氣之虛感受邪氣留而不發散之故也必須先解表邪後扶胃氣丹溪謂無汗要有汗散邪為主有汗要無汗固正氣為主此治之大略也然亦不拘有汗無汗三陰六經悉以四君子湯人參養胃湯為主熱多加柴胡山梔寒多加乾薑肉桂有汗加黃耆浮麥無汗加蒼朮葛根元氣下陷者加升麻柴胡鱉甲以主治之慎勿泥於時俗之說以藥露冷而服致傷元氣變成浮腫瀉痢致脾胃虛弱飲食不進遂成大害戒之戒之羌活膏茯苓五錢羌活獨活前胡柴胡各七錢桔梗枳殼天麻各五錢川芎七錢地骨皮薄荷甘草各三錢上為細末煉蜜丸如芡實大每服一丸不拘時用生薑湯化下前胡半夏丸紫蘇一兩二錢乾葛陳皮枳殼半夏曲桔梗前胡各一兩甘草三錢金沸草款冬花各七錢上為細末煉蜜丸如芡實大每服一丸不拘時用生薑湯化開服香砂保安丸香附炒四兩砂仁炒白朮炒神麯炒麥芽炒各二兩山楂三兩益智陳皮各一兩半木香檳榔使君子炒各一兩甘草六錢上為末煉蜜丸如芡實大每服一丸不拘時用米飲化開服青橘餅子木香炒青皮陳皮去白各二錢半厚朴薑製七錢半神麯炒麥芽炒各五錢上為細末煉蜜丸如芡實大捏作餅子每一餅不拘時用米湯化開下抱龍丸牛膽南星二兩天竺黃五錢雄黃辰砂甘草各二錢五分麝香五分上為細末煉蜜丸如芡實大每服一丸不拘時用薄荷湯化下金薄鎮心丸山藥硃砂各一兩牙硝一錢半甘草人參茯苓各五錢麝香五錢片腦一錢紫河車黑豆水煮二錢五分上用金箔十五片為衣煉蜜丸如芡實大每服一丸不拘時用薄荷湯化開下瀉白散桑白皮地骨皮各一兩甘草炙五錢上為細末每服一二錢入糯米一百粒煎服白玉餅子滑石輕粉半夏南星各一錢巴豆二十四粒去皮用水一碗煎乾將豆細研後入衆藥和勻上用糯米飯丸如緑豆大捏作餅子三歲以上服五餅三歲以下三餅空心或臨臥時蔥白湯下滾痰丸天南星薑製一兩半夏薑汁製一兩半白牽牛末六錢黃芩一兩枳實炒八錢輕粉炒一錢上為末薑汁糊為丸桐子大每服十丸空心薑湯下天竺黃丸天竺黃一兩天南星薑製一兩半半夏薑湯泡五次天花粉各二兩上為細末煉蜜丸如芡實大每一丸薑湯磨化下五疳消積丸青皮陳皮香附各二兩山楂三稜蓬朮乾薑良薑枳殼神麯麥牙各一兩蘿蔔子一兩吳茱萸五錢上為末麵糊丸如粟大每服一二十丸空心白湯下挨積丸三稜丁皮各七錢半乾薑炮一錢巴豆去油淨五錢青皮丁香各二錢半上為末醋糊丸如粟米大每服一二錢食前薑湯送下量病加減香連胃苓丸白朮炒一兩茯苓厚朴陳皮蒼朮白芍各五錢黃連六錢豬苓澤瀉各七錢木香甘草炙各二錢上為末煉蜜丸如芡實大每服一丸不拘時用燈心老米同煎湯化下胃苓丸蒼朮二兩半厚朴二兩陳皮白朮官桂各一兩豬苓澤瀉各二兩甘草茯苓各一兩半上咀片為末每服二錢姜三片燈心一十根老米六十粒煎服大