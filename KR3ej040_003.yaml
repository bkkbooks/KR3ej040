下及目常直視連劄不搐之症並宜用竹葉燈心同煎湯下當歸川芎羌活防風膽草梔子仁生地膽星大黃天竺黃各八錢硃砂一錢五分前胡半夏丸治小兒傷風發熱四時咳嗽氣息喘急痰涎壅盛胸膈不利之症皆宜用生薑薄荷湯化下紫蘇一兩二錢乾葛陳皮前胡半夏面枳殼杏仁炒桔梗各一兩茯苓柴胡桑白皮黃芩各八錢金沸草七錢甘草五錢犀角解毒丸治小兒口舌生瘡咽喉腫痛遍身瘡癤鼻衄痘疹餘毒不盡之症宜用燈心薄荷湯化下犀角防風荊芥芍藥連翹黃芩桔梗薄荷甘草末各五錢生地黃當歸牛蒡子各七錢胃苓和中丸治小兒脾胃缺和飲食不美水土不服或生冷失調小水不利大便泄瀉之症皆可服之用燈心老米湯化下蒼朮白朮各三兩厚朴一兩五分陳皮豬苓澤瀉茯苓車前子木通各二兩甘草炙一兩半參朮健脾丸治小兒脾胃虛弱嗜臥不食面黃肌瘦水土不服大便瀉久完穀不化之症皆可治之燈心老米湯下蒼朮四兩米泔浸炒厚朴二兩薑汁炒陳皮神麯炒麥芽炒各二兩五錢白茯苓炒二兩白朮炒二兩甘草炙一兩和中保安丸治小兒停食積滯飲食少進胸膈飽悶夜臥不寧用清米湯下如大便初瀉或赤白痢疾加燈心老米湯下如嘔吐噁心肚腹作痛則用生薑湯香附四兩砂仁四錢青皮神麯麥芽白朮檳榔末各二兩甘草末二兩山楂陳皮各三兩厚朴蒼朮三稜蘿蔔子炒黃連各一兩牛黃鎮驚丸治小兒一切急慢驚風身體壯熱多睡驚悸手足搐逆痰涎不利人事不醒之症用生薑薄荷湯下天竺黃膽星白芍青皮薄荷桔梗牛黃陳皮防風醬瓜天麻黃芩黃連檳榔甘草末大黃各等分金箔鎮心丸治小兒驚熱鎮心安神不拘時用薄荷湯下山藥一兩半硃砂一兩牙硝一錢半甘草五錢人參五錢茯苓五錢麝香五分片腦一錢金箔十五片為衣紫河車黑豆水煮軟二錢五分緩驚餅子治小兒便青有驚肚腹疼痛不拘時服人參茯苓辰砂赤石脂山藥各二錢白朮一錢麝香乳香各三錢利驚丸化毒丸即此也涼驚溫驚利驚有分別不拘時用天竺黃青黛膽星各一錢牽牛辰砂各五分牛黃丸治小兒夜啼多驚煩熱不拘時服半年者每服五丸量大小加減牛黃硃砂蘆薈麝香鉤藤各一錢姜蠶炒五錢蝸牛炒黃龍腦當歸代赭石赤芍各一錢芍藥丸治胎寒大便青不欲食不拘時用芍藥當歸芎藭人參各三兩甘草炙一兩桃紅丸治小兒驚啼眠睡不穩不拘時用薄荷湯下丹砂麝香各五分白附子半枚二分半姜蠶炒二分半全蠍炒二分半膩粉七分金箔銀箔各二片養脾丸治小兒軀啼脾胃虛冷心腹疼痛胸膈滿悶不拘時用生薑湯化下乾薑泡縮砂白朮各一錢甘草炙三錢茯苓人參麥芽各五錢香連胃苓丸治小兒下痢赤白腹痛口乾不拘時清米湯化下白朮一兩豬苓澤瀉各七錢黃連炒六錢茯苓陳皮厚朴蒼朮白朮各五錢木香甘草炙各三錢安神丸治小兒心虛疳熱面黃頰赤壯熱驚啼精神恍惚不寧不拘時用砂糖湯下麥門冬牙硝白茯苓山藥寒水石各五錢半甘草五錢龍腦一字研柳花散治小兒口舌生瘡每用少許敷貼患處黃連黃柏青黛密他僧玄胡索各等分為末五福化毒丹治胎熱胎毒口舌生瘡不拘時用薄荷湯下玄參一兩桔梗八錢人參赤茯苓各五錢青黛甘草各一錢牙硝另研麝香各五分沒石子丸治小兒熱瀉久痢皆可服之黃連炒二錢半沒石子大者五枚訶子七個炮木香一錢肉蔻七個炮丸如黍米大每服一十丸不拘時用白滾湯下紫霜丸治變蒸發熱不解及夾食停冷溫壯汗後熱不歇及腹中有痰癖乳哺不進乳則咽食癇先寒後熱者用麵糊丸麻子大每服一粒乳汁下代赭石一兩醋浸七次研赤石脂一兩醋浸七次研杏仁五十粒去皮巴豆三十粒去膜油淨保和丸和脾胃消食此方與奇效良方不同奇效良方録於後白朮半夏陳皮白茯苓各十二兩山楂二斤二兩神麯一斤八兩連翹蘿蔔子各六兩水發為丸如麻子大每服三五分不拘時用米湯下消積丸消積化乳食宿砂炒橘皮炒三稜煨蓬朮煨神麯炒麥芽炒甘草炙各一兩半香附炒一兩湯浸蒸餅丸如麻子大每二十三丸不拘時用白滾湯下量歲長幼加減蘆薈丸治小兒積聚清熱消肝健脾胃爽精神美飲食潤肌膚大有神效不拘時用滾白湯下蘆薈胡黃連神麯炒白朮炒當歸芍藥青皮使君子香附三稜煨黃連蓬朮煨檳榔蘿蔔子麥芽炒木香甘草各等分末為丸肥兒丸治小兒疳病臟腑胃虛蟲動日漸羸瘦不拘時白滾湯下用麵糊為丸黃連神面炒各五錢肉豆蔻麵包煨麥芽炒使君子各二錢木香一錢檳榔一個香橘餅子治小兒食積腹脹作痛面黃肌瘦不思飲食並皆治之木香二錢炮青皮三錢陳皮三錢神麯炒五錢厚朴薑製七錢半麥芽炒五錢上為末煉蜜丸捏作餅子不拘時用清米湯化下至聖保命丹治胎驚內吊肚腹堅硬目睛上視手足抽掣角弓反張痰涎壅盛一切急慢驚風並皆治之全蠍十四個姜蠶直者白附子天南星炮硃砂研麝香研各一錢防風天麻各二錢蟬蛻去泥一錢金箔十五片為衣上為末粳米飯取中心者搜和丸每一兩作四十丸不拘時用薄荷湯下天麻防風丸治小兒一切驚風壯熱痰涎壅盛並皆治之天麻煨防風人參各一兩牛黃一錢硃砂雄黃麝香各二錢半姜蠶去絲嘴炒全蠍去尾炒各五分上為末煉蜜丸不拘時用薄荷湯下保和丸治小兒脾胃虛弱飲食不能克化日久羸瘦山楂肉四兩陳皮茯苓半夏曲各五錢蘿蔔子二錢半使君子白朮炒神麯炒麥芽炒各一兩砂仁四兩四錢木香二兩二錢四分黃連四兩五錢上為末水發丸每服一錢不拘時用米湯下犀角丸治小兒風熱痰實面黃頰赤大小便祕澀三焦邪熱臟腑蘊毒此藥疏導極穩生犀角一錢半人參五錢黃連枳實麩炒各一兩大黃二兩酒浸切作大片用巴豆一粒貼在大黃上用絹包裹湯鍋內蒸過取出去巴豆將大黃曬乾研末上為細末煉蜜丸如麻子大每服一二十丸臨臥熟水下未動再服消疳健脾和中丸白朮茯苓陳皮芍藥枳實各五錢山楂黃連厚朴蕪荑使君子麥芽香附各三錢上為末煉蜜丸每服一丸用清米湯或白滾湯食遠下金不換治小兒九種心疼雄黃一錢焰硝三錢硫黃一錢白礬五分飛過上為末丸如粟米大天王補心丹寧心保神益血固精壯力強志健忘清三焦化痰涎祛煩熱除驚悸療咽乾天門冬湯洗去心五味子去梗石菖蒲去毛桔梗去頭泔洗麥門冬湯泡去心玄參茯神酒鹽拌炒去絲酸棗仁遠志甘草水煮去梗人參當歸酒洗去泥丹參熟地黃去梢酒洗生地黃柏子仁去殼各等分上為細末煉蜜丸每一兩作十丸金箔為衣每服一丸用燈心紅棗湯食遠化下辰砂異功膏治小兒夏月傷暑水瀉熱瀉口渴未開葷者更妙又名術苓膏白朮茯苓豬苓澤瀉滑石各一兩祖云去滑石加白朮更妙安胃和中丸半夏曲陳皮枳實青皮厚朴黃連砂仁香附檳榔茯苓山楂大黃各等分為末琥珀抱龍丸琥珀天竺黃辰砂雄黃山藥茯苓麝香姜蠶膽南星全蠍薄荷各等分為末敗毒散治一切腫毒瘡癤皂角炒去尖金銀花陳皮各三錢防風連翹黃芩赤芍白芷川芎各五錢甘草四錢貝母乳香當歸尾各一錢川山甲明沒藥蛤粉炒各二錢天花粉八分上分作八貼每服小二鍾煎八分入白酒半杯再煎三五沸看瘡上下服之又一方蘆薈丸神麯黃連白朮檳榔麥芽使君子青皮陳皮龍膽三稜蓬朮香附枳實蒼朮厚朴蕪荑蘿蔔子各七錢半山楂一兩柴胡青黛各五錢蘆薈六錢木香四錢又一方參朮健脾丸人參茯苓白朮山藥苡仁扁豆澤瀉蕪荑砂仁各五錢麥芽七錢半木香四錢豆蔻六錢山楂一兩半陳皮一兩甘草三錢使君子五錢
