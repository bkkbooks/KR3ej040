body:
  text: 中卷孟氏雜症良方小兒有病須看虎口三關初節寅關食指第一節次節卯關食指第二節三節辰關食指第三節經紋歌左手紅生似線形須知發熱又兼驚右手筋紋如左樣脾傷驚積一齊生紋頭有似三叉樣肺氣生痰夜作聲色青應有傷寒症若是空紅瀉定生指脈深青不暫停微青腹痛糞多青若兼黑色盤腸吊眼搐牽抽不得寧小兒指脈深紅色發熱驚時目強直微紅下痢腹中疼吐瀉脾虛多不食指上紋生紫色深驚時啼叫又呻吟微微紫色腸中痛若是紋彎主噁心虎口脈紋多須知氣不和色青驚積聚下痢瀉如何青黑慢驚發入掌內釣多三關急通過此症必沉疴第一節寅關輕重脈紋有青紫心肝有病主驚搐口舌生瘡發熱四肢厥逆不食黃白紋主食停胃口腹疼腹脹黑色者不救第二節卯關輕重脈紋見青紫心肝受病日久成疳發熱頭眩驚怖面赤口乾燥黃白色紋疳病在脾肺吐瀉發熱咳嗽吐痰黑紋疳在腎繞耳生瘡作腫作脹第三節辰關有重無輕脈紋見者通度三關直上爪甲胃絕多死小兒脈法小兒之脈與大人異九至為傷平和六至沉細知其為冷十至而病困矣急弦為氣之干沉緩為食之滯促急必是虛驚緊者風癇而理弦而又急客忤之氣沉而數者骨熱何議脈來亂者必然難治脈弦急主氣不和脈沉緩主傷食脈促急主虛驚脈浮主風脈沉主冷持脈三要曰舉輕手尋之曰按重手取之曰尋不輕不重委曲求之舉按尋三要惟尋字診家下手之至訣即經之所謂三菽六菽十二菽之旨也脈象綱領圖此將七表八里之脈融會至為切要浮舉之有餘按之不足輕手得而無力則為芤有力則為洪力重則為實細小則為微沉舉之不足按之有餘重手得而至骨有力則為伏無力則為弱少軟則為緩遲一息三四至來去極遲重手得而短細則為澀無力則為軟極數則為緊數一息七八至來去極疾輕手得而有力則為實流利則為滑論浮沉遲數四脈有力無力主病此極要者浮而有力則為風遲為風寒無力則為虛數為風熱俱為表症沉而有力為積遲內寒無力為氣滯數內熱俱為里症遲而有力為痛無力為冷為寒數而有力為熱無力為瘡為燥滑者脈形流利主血不和主氣壅滯主痰澀者脈形濡滯主氣不和傷精敗血俱看在何部此診脈之切要也凡長人脈長當疏下指短人脈短當密排指人瘦小則輕取之人肥大則重取之急性人脈急緩性人脈緩又有反關脈在三部之後側處若過寸口上至魚際者名曰魚際脈有左大右小者有左小右大者有貴人兩手清微全無脈者名六澤脈有兩手俱洪大者須用心診視凡診人脈須先調平自己氣息初輕按消息之次中按消息之再重按消息之分別寸關尺部五六至者為平脈其有太過不及則為病脈也矣小兒囟門高起者熱衝於上也宜清利之囟門陷下者元氣虛脫也宜補助之十二經絡氣血歌多氣多血經須記手足陽明大腸胃少血多氣有六經二焦膽腎心脾肺多血少氣心胞絡膀胱小腸肝所異十二經所屬歌手經太陽屬小腸膀胱經屬足太陽肝足厥陰手胞絡胃足陽明手大腸膽屬少陽足經尋三焦手內少陽臨腎足少陰手心臟脾足太陰手肺金引經藥歌小腸膀胱屬太陽藁本羌活是本方三焦膽與肝胞絡少陽厥陰柴胡強大腸陽明並足胃葛根白芷升麻當太陰肺脈中焦起白芷升麻蔥白鄉脾經少與肺經異升麻兼之白芍詳少陰心經獨活主腎經獨活加桂良通經用此藥為使更有何病到膏肓四時用藥法不問所病或溫或涼或熱或寒如春時有病於所用藥內加清涼風藥夏月有疾加寒涼之藥秋月有疾加溫氣藥冬月有疾加辛熱之藥是不絕生化之源也錢仲陽治小兒深得此理內經曰必先歲氣無伐天和是為至治又曰無違時無伐化又曰無伐生生之氣此皆常道用藥之法若反其常道而變生異症則當從權施治五行五色五味五走五臟主禁例東方之木其色青其味酸其臟肝肝主筋木曰曲直曲直作酸酸走肝筋病人勿多食酸南方之火其色赤其味苦其髒心心主血火曰炎上炎上作苦苦走心血病人勿多食苦西方之金其色白其味辛其臟肺肺主氣金曰從革從革作辛辛走肺氣病人勿多食辛中央之土其色黃其味甘其臟脾脾主肉土曰稼穡稼穡作甘甘走脾肉病人勿多食苦北方之水其色黑其味鹹其臟腎腎主骨水曰潤下潤下作咸咸走腎骨病人勿多食鹹小兒初受氣論聖濟總錄小兒在母腹中受其精氣一月胚二月胎三月血脈四月形體成五月動作六月筋骨成七月毛髮生八月臟腑具九月穀氣入胃十月百神備而生生後六月日瞳子成孩兒能頦笑語識人百日任脈生能反覆一百八十日尻骨成能獨坐二百一十日掌骨成能匍匐三百日髕骨成能獨倚三百六十日脛骨成乃能移步此是常定之法至於不及期而先能並過期而不能者則又稟賦之豐怯是又不可以一概拘也先人有行遲語遲之方諸方書俱載愚意物各有時似亦不必人為惟高明者鑑之小兒始生變蒸三十二日一變生癸腎臟屬足少陰經六十四日二變一蒸生壬膀胱腑屬足太陽經九十六日三變生丁心臟屬手少陰經一百二十八日四變二蒸生丙小腸腑屬足太陰經一百六十五日五變生乙肝臟屬足厥陰經一百九十二日六變三蒸生甲膽腑屬足少陽經二百二十四日七變生辛肺臟屬手太陰經二百五十六日八變四蒸生庚大腸腑屬手陽明經二百八十日九變生己脾臟屬足太陰經三百二十二日十變五蒸生戊胃腑屬足陽明經至於心胞絡臟屬手厥陰經三焦為腑屬手少陽經此一臟一腑俱無形狀故不變而不蒸也然所謂變者變生五臟也蒸者蒸養六腑也又曰變者變其情態蒸者蒸其骨體故血脈方榮骨格始長情性有異於前當變蒸之時看兒子唇口如上唇微腫有如臥蠶或有珠泡子者見變蒸症也即宜少與乳食不可妄投藥餌切不可用艾火灸若不依此多致殺兒屢見有此者故書以告初生論初生芽兒一塊血也無形症也無脈有驚定知是胎驚有熱定知是胎熱內無脈外無形手無紋面無色有病殊不可曉惟心誠求之耳故有聲有淚者驚啼也五味抱龍丸主之有聲無淚者腹痛也木鱉子膏主之啼哭而手足上撒或彎身如蝦者盤腸內釣也鉤藤湯主之抱龍丸天竺黃一兩膽南星二兩麝香二錢辰砂三錢雄黃三錢共為細末煉蜜為丸如芡實大每服一丸作三四次用燈心湯化開抹於舌上仍以燈心湯下木鱉子膏木鱉子去殼細切搗為泥去油淨三分乳香箬葉上火炙去油取末三分共為一處每用一二分鉤藤枳殼各一撮煎汁調為膏抹於舌上以滾白湯送下鉤藤湯鉤藤五分枳殼五分甘草二分玄胡索五分用水半茶鍾煎至二分不拘時與服臍論嬰兒之臍大腸之竅收拾急宜謹慎生下截斷宜長不宜短截後當用絹帛絲綿包裹仍以艾火炙之候乾聽其自落落後如臍乾當以暖臍膏貼之防洗浴水濕換衣風侵如臍不幹而有潮濕水氣輕者以紅絨散敷之重者以龍骨散敷之至於臍風撮口等症以救急湯龍腦膏間十救其一二不可不思患而預防也紅絨散紅色絨或紅色褐子不拘多少燈下燒灰為細末敷於臍上外以膏藥貼之龍骨散龍骨不拘多少入炭火內燒令通紅取出冷定研為細末敷於臍上外仍以膏藥貼之救急湯猴猻糞山中者良人家餵養吃五穀者不宜用也不拘多少煎湯喂之龍腦膏蝦蟆膽同上好冰片搗為膏收於小磁罐內黃蠟封口臨用以銀簪挑出抹入兒口中以燈心湯化下舌論舌乃心之苗唇乃脾之竅舌紅潤而和者無病也舌紅紫者胎熱也黃連甘草朱蜜之法治之舌黃燥者胎熱兼有積乳也以小和中湯治之嬰兒不惟舌燥起刺但不和而吮乳不緊即凶候矣至於唇宜紅潤若紅紫者若燥者皆胎熱也黃連甘草法唇微有青氣者驚也抱龍丸治之唇四圍青黯者驚重也多不可治唇白者胎氣怯弱生而難育有疾難治慎之慎之小和中丸小和中丸陳皮枳殼蒼朮厚朴神麯山楂藿香甘草上為末煉蜜為丸如圓眼肉大每一丸作四五次或薑湯或燈心湯化下黃連甘草湯黃連甘草各等分煎濃湯不拘時服朱蜜法硃砂研極細末水飛淨每用二三分生蜜調濃抹於舌上以燈心湯送下抱龍丸方見前吐論傷胃則吐傷脾則瀉人人皆知其為然惟嬰兒亦有不然者若吐色白者胃受寒也或乳母過飲冷漿以致嬰兒胃寒以香橘餅治之吐色黃者胃熱也或胎中原稟積熱或乳母過食煎煿油膩酒蒜等物以致嬰兒胃熱作嘔以芩連二陳湯加減治之若吐從口射出或從口角順流此非病也嬰兒不知飢飽隨口輒咽以致滿而上溢作嘔此即書之所云水多則沼溢酒滿則卮傾自然之理非疾病也當令其少少與食或微餓之則安若以上諸症妄服藥物者必愈加嘔吐多致慢驚慎之慎之香橘餅陳皮甘草減半蒼朮厚朴枳殼香附砂仁神麯藿香青皮各等分共為細末煉蜜為餅每服量兒大小多寡與服薑湯化下加減芩連二陳湯陳皮茯苓熟半夏甘草黃連薑汁炒山梔薑汁炒枳殼用水二鍾姜一片煎二汾不拘時服驚論驚分急慢治有涼溫書云急驚合宜涼泄慢驚合宜溫補誠格言也故素無疾病猝然之間或發熱或不發熱痰涎壅塞手足抽掣角弓反張目睛上視牙關緊急人事不省此急驚也蓋心為火肝為風風火相搏抽搐不寧此症或飲食過多或食後兼驚或傷風發熱鬱熱生痰痰盛發搐或過食肥甘之物停蓄胃中以致清氣不上升濁氣不下降關格而發搐皆有餘之症治宜清涼行食行痰之劑如牛黃丸鎮驚錠醒風天麻湯之類皆不可緩痰一行氣一降安在須臾矣若因久熱久吐久瀉久嗽或病後失調或急驚過用涼苦之藥或傷食大便久閉不通發熱日久元氣燒爍傳變慢驚手足微微搐弱兩頰乍赤乍白張口露睛吁氣常出氣昏睡不語此慢驚也蓋急驚之病得之自外而入者又慢驚之病得之自病而出者多五臟虛極虛則生風所以微微動搖俗云急驚驚病不驚醫慢驚驚醫不驚病吐後生驚者以星香散主之瀉後生驚者以參苓白朮散主之嗽後生驚者以門冬散主之病後生驚者補中益氣湯加減治之急驚傳變為慢者鎮心丸回生丹本藥內少加截風化痰藥治之大抵治急驚者十全八九治慢驚者十不救一辨之不真藥之不當延緩不能速救以致夭亡者得不歸咎於醫歟牛黃丸枳實大黃陳皮黃芩牛膽南星各等分辰砂水飛入藥內不拘分兩以紫色為度上為末煉蜜為丸如圓眼肉大辰砂金箔為衣每一丸燈心湯化下鎮驚錠子天竺黃五錢膽南星一兩辰砂三錢雄黃二錢牛黃七分冰片五分麝香五分以上另研羌活防風白附子五錢枳實大黃茯神殭蠶全蠍黃連天麻各二兩上為末甘草煎湯打糊為錠曬乾辰砂為衣每服用燈心湯磨下或薄荷湯磨下鎮心丸紫河車黑豆水煮五錢乾山藥一兩甘草一兩牙硝三錢人參一兩辰砂六錢茯神一兩麝香一錢冰片三分共為細末煉蜜為丸金銀箔為衣每服如圓眼肉大或燈心湯或薄荷湯或麥門冬湯化下醒風天麻湯羌活防風天麻枳實黃連黃芩橘紅膽星全蠍茯神用水一鍾姜二片煎五分入薑汁一匙不拘時服星香散膽南星陳皮半夏藿香香附砂仁白朮人參天麻茯神鉤藤用水一鍾煨姜二片煎至四五分不拘時服參苓白朮散人參白朮茯苓甘草陳皮厚朴澤瀉肉桂肉豆蔻麵包煨訶子肉白扁豆炒上為末米湯調下或煉砂糖為丸亦可門冬寧肺散麥門冬陳皮膽南星熟半夏桑皮桔梗白朮五味子天麻防風殭蠶白附子用水一鍾姜二片煎五分食遠溫服補中益氣湯陳皮甘草人參白朮黃耆當歸川芎升麻柴胡加等分天麻茯神用水一鍾姜二片黑棗一枚煎五分不拘時服回生丹天麻防風白附子各二錢殭蠶人參白朮茯神木香肉桂肉豆蔻麵包煨半夏曲各一兩雄黃辰砂各三錢冰片麝香各五分上為細末甘草打糊為餅曬乾辰砂為衣每服量兒大小或薑湯或燈心湯或門冬湯磨下傷寒論小兒傷寒與大人無異所不同者兼驚耳其餘他症傳經等項用藥與大人同特劑有大小耳故惡風惡寒隈人藏身引衣密藏是為表症宜汗者若惡熱惡食出頭露面揚手擲足煩渴燥結氣粗腹滿是為里症宜下宜潤或蜜導法治之若頭額涼手足厥冷面色黯淡大便瀉青此則陰病裡虛當用理中等溫藥以急救其里舉是汗下濕三法其餘可類推矣升麻湯治小兒時行瘟疫及痘疹疑似之間傷寒傷風皆宜服此無汗者加麻黃一錢蔥頭一根升麻乾葛白芍各三錢甘草一錢上用水一鍾姜三片煎五分不拘時服服藥後身涼即止加紫蘇香附陳皮名升蘇散喉痛者加桔梗發斑丹毒加玄參十神湯治時令不正瘟疫妄行感冒發熱痘疹疑似之間不問陰陽兩感風寒濕痹皆宜服此升麻乾葛赤芍甘草麻黃川芎白芷陳皮紫蘇香附水一鍾姜三片蔥頭二莖煎熱服以汗為度麻黃湯治傷寒頭疼發熱身疼惡風無汗喘滿又治太陽病脈芤緊無汗八九日不解表症仍在當發汗者麻黃去節甘草桂枝杏仁去皮尖用水一鍾煎六分不拘時服取微汗夏至後須加知母石膏黃芩蓋麻黃湯性熱夏月溫之必有發黃斑出之失凡傷寒熱病雖涼不可太溫惟春冬病用正方桂枝麻黃各半湯治太陽病八九日如瘧狀發熱惡寒熱多寒少脈微緩者欲愈也脈微而惡寒者此陰陽不和更發汗須汗吐下也面赤反有熱者表未解也汗出少許身必涼桂枝芍藥生薑甘草麻黃杏仁大棗水一鍾煎六分熱服桂枝湯治太陽中風嗇嗇惡寒翕翕發熱自汗乾嘔無汗者不宜用夏至前後加減用之桂枝芍藥甘草生薑大棗水一鍾煎六分熱服服後飲熱粥米飲一盞以助藥力少加薄被覆蓋半時通身微似有汗者佳人參敗毒散治傷寒時氣頭疼項強壯熱遍身疼痛惡寒惡風咳嗽鼻塞聲重吐痰及瘡毒作寒作熱並宜治之羌活獨活前胡砦胡桔梗人參茯苓枳殼甘草川芎水一鍾姜三片薄荷一撮煎五分熱服四順散大黃甘草當歸芍藥薄荷水一鍾煎五分不拘時服竹葉石膏湯治傷寒表裡俱虛胸中煩悶或得汗已解內無津液虛煩少氣如傷寒未解不可服人參半夏甘草石膏麥門冬水一鍾生薑三片竹葉七片燈心廿莖粳米一撮同煎如嘔倍加生薑竹葉白虎加人參湯治傷寒吐下後七八日不解熱結在裡表裡俱熱大渴煩躁脈洪大者人參知母石膏甘草粳米水一鍾煎至米熟為度濾去滓溫服傷風論傷風咳嗽先要發散風邪然後寬氣止嗽化痰有熱用涼肺之藥如面赤飲水痰涎壅塞咽喉不利嗽吐痰食當下之八九月肺氣大旺病嗽者其病必實非久病也亦當下其痰若久嗽則不可下冬月嗽乃傷風也宜當發汗蓋肺主氣應於皮毛肺為五臟華蓋小兒感於風寒客於皮毛肌膚入傷肺經輕者咳嗽重者喘急肺傷於寒則嗽多痰涎喉中鳴急肺傷於暖則嗽聲不通壅滯於寒者必散寒邪傷於暖者必泄壅滯發散屬以辛甘桂枝麻黃是也湧泄系以酸苦葶藶大黃是也五味子收斂肺氣亦治嗽之要藥也久嗽不已肺氣虛急必發慢驚有嗽甚眼目兩眶紫黑如物傷損眼白紅赤如血謂之血眼治之之法當用生地黃及黑豆溫研成膏掩於眼上而眼眶黑自消其血於眼淚中出真良方也兼服麥煎散而嗽自止蓋肺經鬱熱用瀉白散加減肺氣自虛用四君子湯加減中焦實痞宜用大承氣脾不能生肺宜用異功散夫肺氣盛者肺中之邪氣盛也其脈右寸必浮而有力宜用瀉白散以瀉之若肺虛而有熱者執肺熱傷肺之說而不用人參誤矣仍參某症治之若肺非虛而用人參亦誤也用人參鬚以化藥制之高明者酌議九味羌活湯九味羌活湯細辛芩地黃蒼防芎芷草熱服汗之昌三和湯治感冒風邪鼻塞聲重語音不出或傷風頭疼目眩四肢拘倦咳嗽多痰胸滿氣喘短促麻黃杏仁甘草姜三片蔥一根煎溫頓服取汗為度一方加荊芥桔梗有熱加前胡有痰加半夏麥煎散治小兒夾驚傷寒吐逆壯熱表裡不解氣粗喘急面赤自汗或狂語驚叫或不叫語無汗及隱疹遍身赤癢往來潮熱時行麻痘疹子餘毒未盡渾身浮腫痰涎咳嗽或傳變急慢風手足抽搐眼目上視及傷風頭疼感冒風冷鼻塞身熱噴嚏多啼赤芍石膏茯苓杏仁知母甘草葶藶人參麻黃羌活川芎水一鍾姜三片煎五分食遠服清金前胡飲治傷風發熱咳嗽痰喘驚悸桔梗甘草橘紅半夏桑皮前胡防風枳實黃芩天麻花粉水一鍾姜三片煎五分不拘時服瀉白散化痰止嗽寬氣進食地骨皮桑白皮甘草水一鍾姜二片煎熱服葶藶丸治乳食沖脾咳嗽傷風面赤痰盛身熱喘促化痰止嗽寬氣進食葶藶子隔紙炒防己黑醜略炒各一兩為末杏仁去皮尖炒一兩搗膏共為一處加蒸棗肉搗為丸如麻子大每服五丸淡薑湯臨夜服辨諸熱論小兒發熱早晚兩度者謂之驚熱亦呼為潮熱小兒發熱形瘦多渴吃食不長肌肉者謂之疳熱小兒發熱煩吐不時面青者謂之風熱小兒發熱日中可夜間熱天明覆涼謂之傷寒餘熱未解小兒發熱睡覺癲叫無時遍身熱發渴謂之積熱小兒諸病惟熱最多當先辨虛實隨症治之小兒病熱者左腮先赤肝受熱也右腮先赤肺受熱也額上先赤心受熱也頤間先赤腎受熱也鼻間先赤脾受熱也五臟所主熱各不同其治也亦不同是不可以一概論虛熱其症面色青白身微熱口氣冷手足心不熱小便自利恍惚神慢噓氣軟弱泄瀉多尿虛汗自出叔和云虛熱不可太攻熱出則寒起惺惺散四君子湯錢氏白朮散酌用之實熱其症面赤氣粗口熱煩躁唇腫大便秘結小便短數揭衣掀被煩蹄躁叫肚熱肚疼在表宜汗青龍湯解肌湯加麻黃在裡宜下四順飲解肌湯加大黃孫真人曰得利謹勿中補熱氣得補後作若表裡俱熱舉按脈實面黃頰赤唇燥口乾大便堅硬小便赤澀口中氣熱四順飲加川芎惺惺散加麻黃大黃青龍湯解肌湯加大黃黃芩麻黃若汗下熱不除仁齋曰退表熱宜微汗退裡熱宜微下汗下而熱之再來乃表裡俱虛氣不歸元陽浮於外不可再用涼藥及再汗下當和胃氣使陽氣收斂歸內其熱自止參苓白朮散補中益氣湯加減用之柳叔舉曰若經汗下大熱未除恐防痘疹不可忘用涼藥餘熱不除仁齋曰用涼不可十分盡用蓋熱去則寒起古人戒之邪熱在心湯氏曰本臟屬火後為熱所乘故炎上而焦哭其症面紅小便赤口氣熱啼時有汗仰身啼煩躁畏燈大小柴胡湯加生地黃燈心麥門冬竹茹同煎不拘時候服積熱在內小兒內外蘊積熱氣非食積熱也失治則發斑咽喉等疾楊氏曰內因酒面煎炒熱毒熱藥峻補外被大暖爐火侵逼皆能生熱所謂積熱者朝斯夕斯內外久積熱氣三黃丸最要之藥熱出於心熱盛則傷血三黃丸解小兒三焦積熱大黃黃芩黃連各等分上為末煉蜜為丸如皂子大用白滾湯研化食前服風痰熱得患風痰熱晚熱早還涼吃水無時度粥飲食如常日夜多啼叫喘息豈為昌患宜頻進藥莫待復翻張頭熱腳冷氣不和漸生氣喘愛眠多夢裡自驚手足掣除熱消痰不作磨麻痘熱時行瘡痘數日前壯似傷風面頰鮮乍熱乍涼頭有汗虛驚虛悸手多牽唇紅面赤時加喘鼻青耳涼只貪眠目澀氣粗頻噴嚏定有麻痘要相傳驚風熱兒患驚風熱驚啼汗出多糞青兼見乳兩眼卻違和咬乳流涎出腳冷病纏疴若逢頭伸視早治莫蹉跎疳熱此症疳為熱鼻赤齒頻搖乳食常無飽頭瘡鬢髮焦泥炭飧如飯肌膚不長膏五心煩熱盛有積是肝勞潮熱因疾未安和潮熱早晚過體虛並氣弱調理莫蹉跎日久加驚悸脾邪困漸多面腮唇色絕厥逆已沉疴時氣傳變時氣因邪觸春秋及夏冬受邪肝肉內傷客衛胃中頭痛渾身熱心煩兩頰紅鼻清痰嗽喘傳變似傷風夜熱晝涼夜熱身如火天明依舊涼非干邪氣作蓋為客風傷肝熱尿水赤脾蒸糞帶黃汗來方始退肌體漸羸尪諸身通治身中有熱先除熱熱里逢虛先補虛時氣熱巢氏曰感冒四時不正之氣頭疼壯熱與傷寒相似但一時所行之證人人相似為時氣熱用太乙十神湯太乙十神湯陳皮紫蘇川芎赤芍乾葛香附子麻黃白芷甘草升麻水一鍾生薑三片棗一枚去核同煎不拘時候服未受症者加大黃末雄黃末同煎服以解疫毒熱毒之氣疳論疳之為病皆虛使然熱者虛中之熱冷者虛中之冷積者虛中之積治熱不可妄表過冷治冷不可峻溫驟補治積不可峻取蓋小兒易虛易實服寒則生冷服溫則生熱峻取則傷脾胃醫者止宜消積和胃滋血調氣隨順藥餌以扶持之病家從容調理節飲食以培養之使榮衛調和臟腑充實自安矣蓋積者疳之母由積而虛謂之疳極凡有積者無不肚熱腳冷若積而虛甚則扶胃使胃氣充實方與微利急以和胃之藥扶虛救急加白豆蔻蘿蔔子縮砂蓬莪朮消積等藥疏利也肋間癖痛亦虛中之積先寒後熱飲水不食等症當分別治之自然生疳久吐久瀉久痢久渴久汗久熱久瘧久嗽皆因病後失治濕熱傷脾積傳諸臟虛以致之疳症小兒五疳因過多食或因甘甜驚風入腹或因病後不長肌肉致成疳疾不思乳食朝好暮歹或發潮熱四肢羸瘦腹急氣喘頭髮稀疏喜食泥土變成疳勞肝疳肝疳白膜眼中光怕日羞明淚不幹咬甲搖頭肌體瘦腹中堅癖塊多端搖頭揉口鼻白膜眼中縵揩磨常淚出兩目不曾干顏容面青色渾身瘡癬斑毛焦併發豎此病本從肝心疳心疳臉赤少精光壯熱唇紅面色黃才臥皮膚沉盜汗睡中驚恐意恓惺渾身壯熱甚四肢全不任面黃並臉赤怕冷寒重衾口鼻常乾燥根源病漸深只因驚撲著此病本從心脾疳脾疳腹脹體薑黃冷物難消又滑腸揉鼻擦眉愛泥土蛔蟲和糞瀉非常面黃肚大手腳細吐逆中滿乏氣力便下水穀不消容瀉痢酸臭合面睡搭口發豎啼哭頻愛食茶米沙炭類此疳本從脾臟來治之肥兒與蘆薈肺疳肺疳咳嗽體尪羸喘急痰涎氣力衰疥癩皮膚生痛癢頻頻吃食只多飢啼多並嗽逆口鼻脛生瘡昏昏饒愛睡體瘦又滑腸四肢無氣力客熱不同常瀉膿並吐血此病肺家傷腎疳腎疳骨熱主偏墜齒唇焦燥瘡䘌鼻增寒壯熱手如冰母夜咨煎不穩睡瀉痢時頻並吐逆轉加深大腸肛頭脫壯熱兼腹鳴乳食全不進手足冷如冰急疳難治療此病腎家因肥兒丸治諸般疳疾黃連神麯各一兩麥芽面五錢木香二錢半檳榔一個肉豆蔻麵煨使君子酒浸去黑皮各五錢上為末煉蜜為丸如圓眼大每一丸米湯化下蚵皮丸治諸疳無辜疳症蝦蟆一隻肥大不跳不鳴其身多癩者另取糞蟲一杓以水洗淨置桶中將蝦蟆打死頓在蟲中任蟲食一二日將皮揀出裝新布袋中包系定置急流水中漂一日取出瓦上焙為極細末入麝香二分揉飯內為丸如麻子大每服二三十丸米飲湯下或拌在飯內與兒食之效驗不可盡述蘆薈丸治諸般疳症身黃腹脹痞塊泄瀉瘦弱胡黃連一兩使君子去黑皮蓬朮青皮炒陳皮麥芽炒神麯以上各一兩檳榔川黃連各五錢蘆薈木香各三錢瀉者加茯苓一兩肉豆蔻麵煨一兩人參五錢上為末煉蜜為丸如龍眼大米湯空心化下或麥芽面打糊為丸如綠豆大每服五七分米湯吞下天麻丸治小兒疳眼肝疳症真青黛黃連天麻川芎夜明砂蘆薈各二錢半龍膽草防風蟬退各一錢半全蠍二分去毒洗淨炙麝香二分干蝦蟆二隻煨共為細末豬膽汁和水打糊為丸如麻子大每服十丸薄荷湯吞下如不能吞煮煉蜜為丸化下亦可清沛飲治肺疳肺熱鼻熱瘡鼻息作臭欲侵蝕者桑白皮一錢紫蘇前胡防風赤茯苓黃芩當歸天門冬去心連翹桔梗生地黃甘草各五分用水一鍾煎五分食後服服數貼後服化䘌丸化䘌丸蕪夷蘆薈青黛蝦蟆煨取末川芎白芷胡黃連各等分上為末豬膽汁打糊為丸如麻子大每服二三十丸食後以杏仁煎湯吞下其鼻常用熊膽泡湯蘸洗敷鼻千金散青黛當歸赤小豆瓜蒂圯榆黃連蘆薈上味各等分入雄黃少許研極細末入鼻斂瘡蘭香散治小兒走馬牙疳牙齒潰爛以至崩砂出血齒落輕粉一錢蘭香子末一錢密陀僧五錢燒紅醋淬為末上研如粉敷齒上齦上患處立效又方鴨嘴膽礬一錢煅紅冷定研極細入麝少許又研敷牙齒上三黃散治腎疳崩砂良方牛黃一分大黃生地木香青黛各三分上為末熱水調服布袋丸治諸疳面黃腹大飲食不潤肌膚夜明砂揀淨蕪荑炒去皮使君子微炒去皮各二兩白茯苓白朮人參甘草蘆薈各五錢上為細末湯浸蒸餅為丸如彈子大每服一丸以生絹袋盛之次用精豬肉同藥一處煮候肉熟爛提取藥於當風處懸掛將所煮肉並汁令小兒食之所懸之藥仍依前法煮食只待藥盡為度泄瀉論夫小兒泄瀉者證非一端然有冷瀉有熱瀉有傷食瀉有驚瀉當辨其證而治之蓋冷瀉者脾胃受冷肚腹疼痛水穀不化小便清而大便黃白或如糟粕手足厥冷當服理中湯益黃散對症服之熱瀉者大便黃赤小便赤少口乾煩躁宜用六一散五苓散去桂錢氏白朮散去木香治之如夾熱而太陽與少陽合病自下痢者黃芩湯嘔加半夏又夾熱瀉痢而小便閉澀赤甚者加減四順清涼飲服之傷食瀉者由乳食過飽坐臥風冷之所傷兼食油膩之物遂成食瀉宜先取下其積不可便補經云食瀉重當取疳虛用補虛宜大消食丸蘆薈丸量虛實先取其積次以益黃散異功散四君子湯調中湯理之驚瀉者因驚而起眼白青黯大便青黃宜辰砂五苓湯散鎮心丸主之大抵傷脾則瀉而瀉久脾愈傷也脾虛未有不成慢驚者本藥如服過數貼不止急宜大補脾胃若傳變慢驚坐以待斃醫者未必不無責也慎之慎之錢氏白朮散人參茯苓白朮藿香甘草砂仁肉豆蔻麵煨山藥澤瀉用水一鍾姜二片蓮子七個去心煎五分不拘時服四順清涼飲黃連芍藥甘草陳皮枳殼茯苓木通澤瀉胃苓湯治泄瀉脾胃不和傷食作瀉豬苓澤瀉白朮白茯苓厚朴陳皮神麯甘草麥芽用水一鍾燈心二十根陳倉米一撮煎湯不拘時服益黃散治泄瀉冷瀉胃虛腹痛青皮陳皮訶子肉甘草木香肉豆蔻水一鍾姜二片黑棗二枚煎五分不拘時服消食丸寬中快膈消飲食退黃色砂仁橘皮蓬朮神麯炒麥芽炒以上各五分香附子一兩炒上為末麵糊為丸如綠豆大食後紫菜湯下二十丸煉蜜為丸薑湯化下亦可調中湯人參茯苓木香白朮甘草乾薑藿香香附子砂仁丁香水一鍾棗二枚煎五分不拘時服痢論痢者利也痢之為疾無積不成治法大要散邪熱行滯氣消積滯解暑毒開胃進食為先初得痢者便不可用訶子豆蔻樗皮龍骨等劑補住邪氣若氣得補則積滯不得發泄腸胃滯澀腫脹日久難愈痢出於積滯積物積也滯氣滯也物積欲出而氣滯不得與出則下墜裡急後重乍起乍止日夜無度痢者五臟窘痛而不散當先用通利之藥疏其臟腑積滯然後辨其寒熱氣血虛實而施治丹溪云初而重者承氣方輕則黃芩芍藥湯氣血俱虛為八物隨時處治方為良者非此之謂乎導滯湯治初得痢腹痛後重者黃芩黃連白芍檳榔厚朴枳殼陳皮大黃生用水一鍾煎五分入大黃一滾取起生磨木香汁一二三茶匙不拘時服黃芩芍藥湯黃芩芍藥甘草用水一鍾煎五分不拘時服芍藥調中湯治痢已經通行後不問赤白服此調理黃連茱萸炒黃芩陳皮厚朴山楂神麯白芍炒枳殼茯苓澤瀉用水一鍾姜一片煎五分食後服後重者加木香檳榔血盛者加當歸健中湯治瀉痢日久脾胃虛寒下如雞子青者黃連茱萸炒當歸芍藥茯苓白朮陳皮甘草乾薑肉豆蔻用水一鍾倉米一撮煎五分不拘時徐徐溫服瘧論風寒暑濕邪自外來飲食起居邪由內作豈特夏傷於暑秋必痎瘧哉古人以暑受病者多言之耳夫瘧者始而呵欠繼而足冷面色青黃身體拘急寒慄鼓頤腰脊俱痛寒去未幾內外皆熱頭疼而渴但欲飲冷嘔惡煩悶而不嗜食或內伏寒痰皆從背起冷如掌大瘧之寒熱豈非陰陽二氣互相勝負而作耶邪並於陰則寒邪並於陽則熱陰勝則寒多陽盛則熱熾其寒也湯火不能溫其熱也冰雪不能寒衛氣與邪氣交爭其病乃作邪氣與衛氣相離故汗出乃解其病已休衛氣晝行陽夜行陰得陽而外出故發於旦晝得陰而內搏故發於暮夜或二日一發或三日乃發衛氣行遲耳若內外失守真邪不分陰陽迭勝寒熱互起則休作無定時矣青皮飲治熱多寒少胸滿不食口苦舌乾煩渴飲水小便黃赤大便不利青皮厚朴白朮草果柴胡茯苓半夏黃芩甘草用水一鍾姜三片煎五分食前服草果飲治寒多熱少或遍身浮腫厚朴草果青皮藿香半夏甘草陳皮神麯良薑水一鍾姜三片棗一枚煎服清脾飲治小兒瘧疾作浮腫兼有寒熱不退飲食不進白朮茯苓厚朴青皮陳皮半夏大腹皮檳榔莪朮木通甘草水一鍾姜二片煎服常山飲治一切瘧知母貝母半夏甘草茯苓常山人參草果厚朴水一鍾姜三片棗二枚煎熟露過夜空心溫服香葛散治小兒夾食感冒瘟疫瘧疾症香附子紫蘇葉陳皮青皮甘草葛根水一鍾姜三片蔥白一莖同煎不拘時服腫脹論腫脹二症此由虛中有積久患失治漸傳症候輕重多端須先固其本後正其標得無恙矣有溫腫毒氣腫傷寒虛腫瀉痢虛腫有疳脹有氣脹有癥疾脹飲食膨脹以上腫脹有實有虛實不可補虛不可下若誤下致脾虛氣上附肺而行肺與脾子母皆虛則目疱腮頰腫短氣喘滿也脾主四肢母氣虛甚則黃也調治各有其法其受濕於脾胃久不克化氣浮四肢頭面皆腫有冷積停留於胃脘致虛入腹作腫傷寒下之太早乘虛入腹作腫瀉痢久而脾亦虛作腫以上腫者宜先調胃氣補臟腑然後去腫其血氣腫皆由榮衛不順臟腑怯弱壅滯三焦百脈流注脈絡表裡俱虛邪正亂作以致四肢浮腫肚腹膨脹以上先調榮衛之順次服分氣以散之至於疳氣積脹宜先蘆薈丸癰痞氣脹宜三稜丸等以消其痞至於虛冷脹者宜沉香煎以溫之以上諸症宜調和胃氣消磨通利腫脹必平復矣如有熱者葶藶牽牛以治之丹溪云諸濕腫脹補中宮補中行濕應為宗腰以上腫微汗之以下小便須要通庸醫不識其中趣妄將下藥而利水若還利水氣一脫禍不旋踵必可許故補中行濕治腫滿之要法也分別氣血而用四物四君子加以五苓其百發而百中者於高明君子酌議之塌氣丸治飲水過多停積於脾故四肢浮腫宜服此以消之蘿蔔子赤小豆炒陳皮各一錢木香二分甘草五分黑醜一錢上為末糊丸如綠豆大三歲者服三十丸米飲湯吞下推氣丸陳皮檳榔枳實黃芩黑醜蓬朮青皮各等分上為末煉蜜為丸如龍眼大每服一丸用薑湯化下補中行濕湯治諸般虛腫小水不利者陳皮甘草蒼朮厚朴白朮人參茯苓豬苓澤瀉肉桂水一鍾姜三片燈心二十根煎五分不拘時服勻氣散治脾肺氣逆喘嗽面浮小便不利桑白皮桔梗赤茯苓熟半夏陳皮甘草木通澤瀉藿香水一鍾姜一片燈心二十根煎五分不拘時服榮衛飲子治小兒氣血俱虛四肢頭面俱浮以至喘急者並宜服之川當歸熟乾地黃川芎白芍人參白朮茯苓甘草枳殼黃耆陳皮水一鍾煎五分不拘時服丹瘤論瘤者流也片片如脂遊走而不定之謂始於胎毒後因烘衣洗浴而得故從心腹而發於四肢者易治從四肢而入心腹者難治入心入腹入囊作脹作瀉舌乾驚悸則不可救藥矣黃連法牛肉切成薄片晾半乾用黃連煎濃汁將牛肉片投入黃連汁內泡片時以牛肉貼瘤上肉乾再易換過數次即有效矣白玉散寒水石滑石各一兩共為細末調敷患處又方伏龍肝碾細末雞子清調敷患處又方牛蒡子搗爛敷患處消毒救苦散金銀花當歸赤芍生地牛蒡子連翹防風天麻粉羌活犀角屑水一鍾燈心二十根煎五分不拘時服上身者加川芎桔梗下身者加木通黃柏耳中生瘡耳為腎之外候腎通竅於耳也夫十二經脈上絡於耳若耳中生瘡疼痛乃厥陰少陽風熱熾盛而上升故患此出膿汁而痛治法宜疏熱散風口舌生瘡中央黃色入通於脾開竅於口脾和則口能知五味矣舌乃心之苗能知味而舌中有脾也夫口之為病或為重舌木舌或為糜爛生瘡未有不由七情煩擾五味過傷之所致也舌病本乎心經蓄熱而然口瘡皆因脾熱所致宜各推類而治之無有不安也脈法左寸洪數心經熱右關沉實脾胃中有實熱心脾虛者中氣不足口瘡服涼藥不愈者理中湯主之齒病夫齒者腎之標骨之餘也足陽明胃之脈貫絡於齒上齦手陽明大腸之脈貫絡於齒下齦手陽明惡寒飲而喜熱飲足陽明惡熱飲而喜寒飲故其為痛有惡寒惡熱之不同也有開口呷風則痛甚者腸胃中有風邪也有開口則臭穢不可近者腸胃中有積熱也或有痛而齒動或有痛而蟲侵蝕或有齒縫疏稀飲食不便者比比是也大抵齒齦宣露而動搖者腎氣虛也治宜滋陰補腎為要憎寒惡熱而口臭穢者胃氣熱也治宜安胃瀉火為良其所謂風邪蟲蝕之症蓋因熱生風而風生蟲也腸胃之火既平更加以擦牙殺蟲之藥以治其標無不安之理也脈法右寸關脈洪數或弦而洪腸胃中有風熱大凡齒痛尺脈洪大而虛者腎虛主齒動搖疏豁相火上炎而痛瘰癧瘡夫瘰癧者有風熱毒氣之異皆由忿怒氣逆憂思過甚食味之厚相搏於經絡其症生頸項胸臆之間結聚成核初如豆粒漸若梅李累累相連大小無定初覺憎寒壯熱咽項強痛況少陽一經多氣少血不繫丹毒膏粱火極之變即因氣鬱脾虛惱怒所致止宜補形氣調經脈詳脈症經絡毋犯病禁但屬脾虛宜養胃健脾若用驅熱解毒耗氣之藥虛虛之禍如指諸掌其疾或發於一經或兼二經者止當求之於一二經不可干擾余經也須分虛實實者可治虛者可慮仍戒暴怒氣惱忌甜糖厚味辛辣之物而調理不然日久變成疳痞之症則難愈矣消腫湯消腫湯內柴連翹牛蒡紅花當歸梢黃耆芩連天花粉桔梗貝母力能消又方土茯苓四兩防風五分荊芥五分蜂房五分肥皂子九個金銀花一錢竹葉七片燈草三十根上水五六碗煎三四碗隨意服又方肥皂子燒灰存性為末每服二錢好壇酒調下又方馬鞭草不拘多少日日煎湯隨意飲之諸瘡成漏病源云癰疽瘰癧諸瘡膿水日久不痊皆變成漏有熱停積流膿不絕謂之膿漏者瘡口被風冷襲之久而不愈謂之冷漏或瘥後復發或移易之別處謂之久漏由是而言所謂漏者因諸瘡久出膿水或氣血俱虛肌肉無由而生故瘡口不合遂成其漏夫蓄熱毒者清之風冷者散之溫之而後補氣血自愈當歸連翹散治一切風熱癰腫瘡瘍咽膈不利舌腫喉閉脈洪大而實或洪數壯實之人大便秘結腫高色赤當歸連翹散黃芩山梔赤芍忍冬藤熱甚加入大黃服能消熱毒效如神千金托裡散治如前千金托裡薄荷硝歸芍大黃並連翹黃芩甘桔山梔子煎成入蜜有功勞涼膈散涼膈散治上焦熱連翹山梔並柏葉竹葉甘草共黃芩大黃芒硝治熱結托裡內補散膿潰之後宜多服托裡內補耆朮參芎歸芍草忍冬苓防風白芷皂莢刺潰膿之後服如神防風通聖散防風通聖滑石膏歸芍芎梔薄荷翹麻黃甘桔苓白朮荊芥大黃並芒硝
