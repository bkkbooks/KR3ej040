front:
  text: 後序不佞遊學白下即聞春沂先生之名未識其面也後於友人寓獲識其面未知其術也及兒輩患痘甚惡諸翳咸目為逆獨先生目為險日三顧而保全之嗣是凡雜症即先生一一治焉靡不應手而愈先生之術誠神矣哉然業是術者恆以九流自居小道是泥先生則素性慷慨足稱豪俠以之積德為重而資身為輕也故無論貴賤貧富望風生快飽德於中互為傳誦於是先生之名日益著不佞謂先生與其著名於一時孰若垂名於萬世則述作似不可少乃先生急於救人飲食且不暇又奚暇及此無何有事於犴狴殆天假此於先生為述作計也先生既出書果獲成非唯先生酬其素志即不佞之素志亦酬矣不佞因請付諸梓而先生並錢氏方俾不佞校而梓之不佞因總集而目之曰幼幼蓋先生前此頗艱嗣息茲且幼是取子輿氏幼吾幼以及人之幼之義云爾書行先生之德更溥矣哉萬世之下見先生之書不啻識先生之面矣果一時之足云萬曆乙未孟秋望日錢唐胡文煥謹識
