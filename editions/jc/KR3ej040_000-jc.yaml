body:
  text: 幼幼集附本草藥性升麻味苦平性微寒升也陰中之陽也引蔥白散手陽明之風邪引石羔止足陽明之齒痛引諸藥遊行四經升陽氣於至陰之下因名之曰升麻羌活味苦平性微溫升也陰中之陽也散肌表八風之邪利周身百節之痛排巨陽肉腐之疽治新舊風濕之症乃手足太陽表裡引經藥也白芷味辛性溫升也陽也去頭面皮膚之風除皮膚燥癢之痹止足陽明頭痛之邪為手太陰引經之劑起痘瘡頂陷退風疹疏熱癢之要藥也防風味甘辛性溫升也陽也以氣味能瀉肺金以體用通療諸風治痘發驚者與天麻同用葛根味甘平性寒可升可降陽中之陰也發傷寒之表邪升痘疹之熱毒理胃虛解煩渴乃痘瘡已見形未見形之要藥也須白色如粉者佳人參味甘氣溫升也陽也能益元氣而和中生津液而止口渴治痘之聖藥非此莫能固里量人大小多寡用之若裡實毒盛者不宜用也須擇明潤者佳乾枯碎小者無力黃耆味甘氣溫升也陽也能益元氣而補腎溫肉分而實肌治痘賴此里托外負量人大小多寡用之若表實者不宜用須箭桿綿軟不油者佳十日之後痘發已足不肯收斂蜜炙隨意用甘草味甘平氣微溫陽也能解諸毒而瀉火健脾胃而和中治痘賴以分理陰陽佐正君臣之道也寒則炙用熱則生用須擇堅實者佳官桂味辛熱浮也陽中之陽能祛風邪而實腠理和榮衛以固肌表桂枝引藥力以上行肉桂引藥力以下行開榮衛藉力以達於表冬月夏月斟酌多寡用之川芎味辛氣溫和也陽也能助清氣而升頭面引參耆以補元陽小如雀腦者佳當歸味甘辛氣溫可升可降陽也治各有條能生血止血活血養血治痘賴以助血歸附氣位必加芍藥以佐之恐其活血流動毒無定位宜身大白淨者佳酒洗銼片焙乾用大便不實不宜多用茯苓味甘淡性溫降也陽中之陰也能利竅而去濕止渴而生津治痘不可過用惟瀉渴及毒不斂而發水疱者不禁惟堅白大者佳白朮味甘氣溫可升降陽也能利水道而除濕益脾胃而退熱治痘不宜過多非瀉痢發水疱者不加漿毒溢盛不結痂者多用宜於潛細白而堅者佳白芍藥味酸平性寒可升可降陰也能健脾氣而補表止腹痛而收陰治痘血散不歸賴以收之而附氣也痘解不斂賴以收之而成功也宜白大者佳須酒浸透切片微火炒過用七日前少用七日後大用紫草味苦氣寒能補中氣而制諸邪行痘毒而利九竅瘡色白者不宜用須紫茸染手者佳若色紫赤毒盛者五日前後皆不禁也陳皮味苦辛氣溫可升可降陽也能和中而益脾消痰而行氣不可多用若去白而名橘紅者專主消化痰涎行氣壅滯惟暫用之則可以廣東陳久者佳麥門冬味苦甘平氣微寒陽中之微陰也能清肺火而止渴補心氣而生脈治痘宜白淨小者佳須去心用之木香味苦辛氣微溫降也陰中之陽也能調氣而破堅和胃而闢毒若痘行氣助參耆之力止瀉痢而理後重不可過於多也宜如枯骨黏牙者佳磨水用或銼片同煎亦可肉豆蔻味辛氣溫能止霍亂而溫中治積冷而止瀉非水瀉久痢不加乃一時救急之要藥也宜大而堅實者佳麵裹煨熱去面用鼠黏子一名牛蒡子味辛氣溫平能潤肺而散氣利咽而退腫治痘專解毒起頂不可缺少者微炒研細用荊芥穗味辛平氣溫陰中之陽也能除風熱而消毒清肌表而利咽治痘專退壅腫而解餘熱宜穗不宜莖香鮮者佳黃連味苦氣寒升也陰中之陽也能瀉心火而散痞燥胃濕而厚腸治痘專退餘熱毒解之後臉赤潮熱不可缺宜川蜀堅實者佳銼碎酒炒用山楂子味甘酸氣溫平陰中之陽也能寬氣消食益脾去垢治痘專平氣解利參耆之滯宜赤色肥大者佳糯米味甘氣溫升也陽也治痘專溫脾胃之中氣不使毒內攻制紫草之餘寒不使味傷胃宜粗大白色者佳黃陳米味甘氣溫升也陽也治痘專扶穀氣以助胃氣益真氣而和胃氣宜多年倉廩中香黃者佳生薑味辛氣溫升也陽也能止嘔和中助陽發表治痘不可缺以其力能助參耆之功也宜老而生者佳天麻味辛平性溫無毒降也陽也專治痘疹首尾驚悸祛諸風麻痹不仁須明淨者佳大棗味甘平性溫無毒降也陽也助脈強神大和脾胃紅花味辛性溫無毒陽也逐惡血生新血活滯血補虛血木通味甘平性寒無毒降也陽中之陰也瀉小腸火積而不散利小腸熱閉而不通瘡之熱盛毒重者非此莫去宜用淡黃色者連翹味苦平性微寒升也陰也瀉諸經之客熱散諸腫之瘡瘍排膿托裡不可缺者厚朴味苦辛性溫可升可降陰中之陽也苦能下氣去實滿而消腹脹溫能益氣除濕滿散結調中生地黃味甘苦性寒沉也陰也涼心火之血熱瀉脾土之濕熱止鼻中之衄熱除五心之煩熱枳殼味苦酸性微寒沉也陰也消心下痞滿之痰泄腹中滯塞之氣推胃中隔宿之食削腹內日久之積須年深日久者佳銼碎麩炒過用桔梗味苦辛性微溫升也陰中之陽也止咽痛兼除鼻塞利膈氣通調水道一為諸藥之舟楫一為肺部之引經大黃味苦性寒其性沉而不浮其用走而不守奪土鬱而無壅滯定禍亂而治太平若痘疹熱毒熾盛煩躁引飲二便不通非此莫救急救者不可缺酒浸透蒸熟焙乾用之黃芩味苦平性寒可升可降陰也中枯而飄者瀉肺火消痰利氣細實而堅者瀉大腸火養陰退陽中枯而飄者除風濕留熱於肌表細實而堅者滋化源退熱於膀胱酒浸透銼片微炒焦用退肌表熱以柴胡為使草決明味苦甘平微寒沉也陰也瀉肝熱明目驅風半夏味辛平生寒熟溫有毒降也陽也止嘔去痰涎除濕和脾胃定頭疼須生薑製過方可用木賊草味甘微苦降也陽也瀉肝熱開眼中雲翳兼治腸風下血女人赤白帶崩穀精草味辛溫可升可降陽也破翳膜遮睛兼治喉痹止齒痛射干味苦平微溫降也陰中之陽也開喉止痛明目消腫專治咽閉貝母味辛苦平微寒可升可降陽中之陰也清痰下氣止咳嗽治肺虛
