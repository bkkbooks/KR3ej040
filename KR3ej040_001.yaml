body:
  text: 上卷孟氏治痘詳說論種子不宜服熱藥世人有無子嗣者皆謂腎家不足乃服鹿茸鹿角膠霜鎖陽蓯蓉龜板等輩以溫腎不知腎不可溫也蓋腎水本寒衰則熱矣故腎虛為病皆是熱症夫欲壯腎水以滋陰而反以藥助其熱則水益涸而腎益虛蓋人之得子全賴腎水故二八之年腎氣勝天癸至陰靜陽動即易之所謂男女構精萬物化生故能有子是宜以和平之劑壯水之源如人參當歸地黃枸杞等藥服之則水滋火降精滿氣充何患無子不然如劉河間所謂病本熱而無寒又得熱則病轉甚世人不悟乃謂服此熱藥自誇陽事易舉行房不倦甚得其助不知熱藥助火一時舉陽有功火易舉則水易涸徒知房中之藥而不知所損於腎者居多也每每見服熱藥者或生癰毒或染風疾色槁齒落身瘦耳焦既絶其子嗣而又傷其身軀不亦可哀也哉醫學鉤玄內云五湖陸君兄弟以文名縉紳儒林間而獨不悟此說生平服壯陽固精藥兄弟俱染中風而卒豈虛語哉夫服熱藥豈徒不能結胎生子而熱毒流注胞胎雖生其子往往為痘疹所患故深為之戒也世人欲種子者幸勿以豫言為迂論出痘根源夫人稟天地陰陽之氣以有生受父精母血以成形固自然之理然父母交會之際不無淫火之毒至於兒在母胎數月借母之氣飲母之血為母者不能節房欲忌口腹冬則烘衣被夏則頻洗浴日積月纍蘊於胎胞蓄於兒身謂之胎毒降生以來其毒不即發泄俟外邪沖搏與原受穢毒相激遂令出痘先年痘氣之行多在於午卯酉之年蓋子午年君火司天卯酉年君火在泉諸瘡癢痛皆屬心火況痘自頂至踵無所不到者而豈泛常瘡之痛癢可比者乎故其發也得於有生之先受於已生之後自始至終無不假氣血以生長收靨其遲速之不同則歲運之乘否而輕重之互異則毒氣之淺深此理之可測而亦勢之必然其曰痘瘡者蓋象氣以命名耳至於所謂茱萸痘菀痘蠢痘蛇皮痘之說則又老嫗之俗談也方書所載預備痘法甚為詳切如所謂挖去口中惡血於啼聲未出之先服甘草黃連朱蜜於既去惡血之後並瓜蒂散兔血丸稀痘丹三豆湯浴體法之類以解逐胎毒安調臟腑無不善者其間又有效於彼而不效於此效於此而不效於彼者學者不可以為無益而盡廢之至於沿街遍野不分大小一概染出瘡痘輕者俱輕重者俱重此則歲氣並臨疫癘傳染天行瘟毒所致豈可概以為胎毒必須明歲氣所及人之氣血虛實天之寒暑溫涼地之東南西北或消毒或和中或解或表或下或補或涼或溫使正氣得保全之功邪氣無留滯之患若他鄉市井老嫗幼婦之說豫不敢書以亂人心志惑人之聽聞也為人父兄者當熟思而詳察之論大痘水痘斑疹分別發熱後三五日之間紅點出水疱水疱成膿疱膿疱結痂干靨脫落者總謂之痘此則胎毒之所發也其或隱隱見於皮膚之間不發胖不膿不痂者謂之癮疹一見紅色出而覆沒沒而復現者謂之膚疹北人謂騷疹遍身紅瘢如蚊蚤所咬如錦紋雲霞者謂之斑疹吳人謂為疹越人謂為瘄其或初紅點有類痘瘡不三日而灌水灌漿顏色紅潤方見漿而即焦者謂之水痘世人有以水痘誤認為正痘者或有醫人奉承病家妄言水痘內帶過幾粒大痘者殊不知大痘之毒五臟之毒毒之重者也出不易長長不易漿漿不易收水痘之毒毒之輕者也出即生清漿漿滿即破皮破即乾結痂間有人家不忌表藥妄食毒發之物以致水痘潰膿成瘡作麻點者又不可不辨也且大痘毒重水痘毒輕重病兼輕病容或有之豈有患輕病而帶過重病者耶以上諸症乃脾肺經蓄熱或外感風熱或傷食積熱或驚後傷寒後乘間而發不可盡歸於胎毒也方書內皆謂痘瘡色赤而小者屬心色白而大者屬肺色青而小者屬肝色黃赤而淺者屬脾又有陳氏三穢毒之說皆以意逆之而云然耳豫何人斯而敢妄為議論耶醫者能審表裡察虛實別寒熱而施治焉自無夭枉之患矣論發熱痘瘡欲出必先發熱然亦有因驚熱風熱溫熱潮熱壯熱之類久而不去內外激搏而痘毒亦或因之而發見者大概與傷寒相類而實與傷寒大不相同何也蓋傷寒所傳從表入里痘毒所發由里達表故惡寒無汗左額青紋面色慘而不舒此傷寒之所有而痘疹之所無也目睛黃眵耳後紅紋耳尖尻骨獨冷面色四肢俱赤惡熱而不寒此痘疹之所有而傷寒之所無也若疑似之間辨認未真先以升麻葛根惺惺散探之若果見其痘矣又當別其熱之輕重以知痘之多寡痘之淺深如溫溫微熱時作時止或二三日或四五日呵缺盹悶夢中驚悸面色微紅沉沉喜睡此痘必稀其毒必輕可俟見苗之後隨症調治百不失一蓋外發熱者由內毒之所激也毒淺則熱輕故遲延三四日而出者輕身涼脈靜而出者為尤輕也其或驟發壯熱如火薰蒸炙手不可捫摸頭面俱赤悶亂昏眩狂躁不定或一日半日二日之間即見紅點此由內毒太盛瘡必稠密急宜投以解毒活血消導清涼之劑又有發熱之時腹中作疼時時攻攪上下不定或煩躁作渴譫語妄言即當通其大便得一大通利其痛必定其熱必滅瘡亦隨發若不肯下若下少遲煩躁不定胃熱發瘢口臭唇燥口角流血白睛紅赤腹脹喘滿身發紫疱而死者非誤乎然則痘瘡首尾不可下之說則又一偏之見也痘瘡發熱腰脅大痛此毒在肝腎孰不以為至惡之候不治之症然亦有因氣怒而起脅痛不能轉側者當於本經藥內倍加柴胡酒炒白芍藥香附青皮之類治之亦有因閃肭而腰痛者當於本經藥內加活血藥及官桂乳香木香之類治之亦有因外感風寒而腰痛者當減本經藥倍加羌活防風白芷肉桂之類以溫散之不可忽略悉認以為痘之腰痛而棄之也豫每每試驗臨時當細加審察不可輕易發言驚恐病家父兄慎之慎之痘瘡或吐或瀉並作俱於發熱時二三日內見者乃其邪氣毒氣食積作吐作瀉當因其症而施治不可驟然止之俗云千錢難買痘前瀉蓋言熱隨利減毒隨利減也若痘現苗已定而吐瀉猶不止恐損脾胃當用人參調中湯七味豆蔻丸或參苓白朮散治之若火盛迫於上下而作者又當斟酌連翹牛蒡子酒炒黃芩黃連山楂枳殼皆可選而用之也痘瘡發熱時發驚發搐如驚風狀者蓋心為火肝為風風火相搏是以抽搐不寧如是見痘俗呼為驚痘驚痘多吉者何蓋驚屬心火痘發由驚則心經痘矣是以多吉若搐不定痘不透當用升麻葛根湯加天麻防風木通並抱龍丸燈心湯調服至如頭額胸背手足之間微微自汗者此腠理疏通毒氣發泄不須服藥若瘡已見形驚風不定昏昏如睡痰壅氣喘人事不省兩目不開譫言妄語下後不減毒氣壅盛邪氣閉塞清道不行至惡之症不可認以為驚痘書云驚之輕者毒亦輕驚之重者毒亦重正此之謂也痘瘡發熱之時唇不紅赤脈不洪大灑灑淅淅顫顫兢兢如惡寒之狀間作乾嘔此表氣素虛瘡毒流滯於腠理之間欲出不出所致宜參蘇飲以和之則痘自出而寒熱俱退慎勿輕用解表之劑以成虛虛之誤若發熱日久綿綿不已或外感風寒腠理閉密痘瘡為邪毒所遏而不出當用麻黃解表湯以表之若大病之後失調理或吐瀉後脾胃氣虛痘毒內陷而不得出須用參耆內托散以補之若傷食膩膈阻塞清道腸胃與痘毒合併而不出此內實也當用枳實導滯湯以利之自然痘出若熱不止痘不出當以藥發之升麻湯羌活防風乾葛川芎桔梗之類微發不出再加藥以發之發後熱退身涼此邪氣解散無病症也不必服藥若服表藥後所出不多熱退氣和此瘡本稀少不可重發以增斑爛之患痘瘡發熱之時亂言狂語見鬼見神尋衣摸床昏睡不醒者此皆毒氣內攻心神不清所致宜導赤散加連翹黃芩犀角木通牛黃丸抱龍丸辰砂益元散使小便流利精神清爽痘亦漸出方望生意若昏倦軟弱人事不省口語喃喃不休者則不可治矣出痘遍身皆熱獨手足如冰此脾胃虛也蓋脾竅通於四肢急宜補中益氣湯理中湯參苓白朮散以生胃氣若手足熱者可治仍冷而厥者則不可治矣又有內傷冷食而手足逆冷者當用香砂平胃枳實麴櫱之劑不可執以為虛而妄補也痘出發熱口鼻大小便皆有血出此毒盛薰灼太過逼血妄行至為惡候惟從鼻出者由肺家大熱可投玄參解毒湯以解之大便內去血者熱毒從利減也當以黃連當歸芍藥枳殼山楂木通甘草牛蒡子連翹酒蒸炒黑大黃治之大抵痘瘡見血十不救一醫者審之治痘全在發熱之時看其輕重表裡虛實寒熱分別明白審真認實當表則表當解則解當汗則汗當下則下當補則補當泄則泄使毒氣不致於壅遏慎勿泥於首尾不可汗下之說以貽後患其或痘出四五日身熱猶不除者尚能加添痘瘡不可謂已出盡大抵必待熱退盡方可謂痘瘡出淨也痘瘡出至六七日復又身熱此將行漿而血少也當用保元湯加當歸川芎白芍藥以助之若血少而有餘毒者用加味連翹散一二劑世俗所謂蒸漿熱者是也若痘已出完復又發熱此非餘毒即系血少急宜隨症施治若發熱兼咳嗽者欲作疹也俗云痧蓋痘當用前胡防風荊芥蟬退桔梗陳皮熟半夏山楂以微透其毒書云熱不可驟遏宜輕解之若無熱則又不可發升用藥者不可不知論見形痘瘡發熱三四日而出或身涼而後出大小不一等顆顆相間如痘如珠摸之礙手明潤光澤根顆紅活痘與皮肉紅白分明作三次出天庭無年壽無喉下無頭面胸背稀少飲食言動大小便如故至吉之兆順之症也不須服藥當觀其日後何如隨時調理而已熱便出瘡多稠密當詳視其稠密之中根顆分與不分顏色紅潤不紅潤有無黑色痘疔芋頭皮色痘疔紫色痘疔更察其元氣虛實年紀少長若疔少根腳分明顏色紅潤元氣實年力大飲食強者當以銀針挑破疔口括去惡水惡血塗以四聖丹拔其毒內用小劑保元湯加活血解毒之藥治之如頂不起者倍加鼠黏子小便祕者燈心湯調益元散用藥後如飲食不減大小便調瘡色飽滿光澤日長一日依期灌漿不煩躁不癢榻不瀉或癢而抓破鮮血淋淋扶過十三日十五日自然平復其或過用解毒之藥致寒氣損傷脾胃作瀉作嘔癢渴不止咬牙寒顫者投以陳氏異功散七味豆蔻丸止瀉調元溫胃亦可得愈痘既見形雖分根顆身尚發熱瘡色乾焦枯紫大便燥結此火盛毒熾氣血分俱有熱也久則津液枯而發渴當用四聖散導赤散犀角飲使心火有所導引則熱自退更用涼血解毒湯辰砂益元散無使其變壞轉黑而為危惡症也若身不熱而止乾焦者此內熱也導赤散加木通即安痘色雖紅活卻過於嬌嫩如水噴桃花之狀此皮嫩囂薄元氣不實毒入氣分者也當大劑保元湯少加酒洗焙乾當歸身酒炒白芍藥肉桂糯米為治痘色淡白而嫩或皮寬者此毒雖少而元氣至虛不能擴充者也宜參耆內托散倍加糯米為主保元湯加生磨木香汁官桂等藥治之痘瘡起色雖紅但乾燥口渴者此火盛血不足當用生地四物湯加牛蒡子紫草木通連翹等治之痘雖光潤以手摸之即破此血有餘而氣不足或衣被過厚汗出過多或先用表藥劑大以致如此宜大劑參耆內托散主之保元湯加官桂等治之痘色如麩殼無紅色無水氣者此氣血俱虛雖用八物亦不能轉間有一二服八物湯並黃耆肉桂之類變為紅潤含水者此又可治也否則危矣以上諸候俱有癢搨之變均之為險症也痘內遍身有碎小密如芥子者此夾疹也有內色鮮紅成片或塊者此夾斑也皆毒火太盛薰於中故一齊湧出宜解毒涼血使斑疹消去則可施治以蟬退荊芥殭蠶川山甲等治之蓋痘瘡夾斑疹如五穀中夾荑稗未有不耨去荑稗而得五穀茂盛者也書云瘡夾疹者半輕半重三日退者可治三日不退者難治痘初出時便見水泡才二三日即頭戴白水不久即干其餘平頂不起此毒至盛謂之太過失序俗云未老先白頭不治者也痘既出之後若叢雜團聚密如蠶種堆垛如魚子平搨如胖蠶抓破如蛇退皮結痂如冷粥皮頭面眼胞口唇上下一齊光腫則五七日內當發斑發血泡及口鼻出血而死蓋痘瘡喜其腫而皮肉不喜其腫書云瘡腫肉不腫者昌肉腫瘡不腫者亡正此之謂也若簇簇於皮膚中如寒風粟起之狀或隱或見者此不待長髮當啼叫煩悶而危若正面胸背手足腫硬成塊或青或紫如丹瘤之狀者當成黑陷破爛挖坑而危若紅紫黑斑如蚤咬如蚊跡如灑朱如點墨如青黛與皮膚一平及頭面一片如胭脂者此極惡之候三朝五日即危矣論部位痘瘡於初放點之時先察部位所發之處即可預知其輕重吉凶若口鼻兩傍人中上下腮耳之間先出現者吉若從兩鬢角耳後咽喉處先出現者凶也其起漿收靨亦如是至如頭者諸陽聚會之處兩頤兩頰五臟精華之府咽者水穀之道喉者呼吸之門胸腹者諸陽受氣之地為心肺所居痘疹最要五處稀少若頭額多者謂之朦頭毒參陽位也頸項多者謂之鎖喉胸前多者謂之縵胸朦頭則視聽廢氣化絶鎖喉則內不出外不入縵胸則陽不清而神失守兩頰兩頤多致成片或如塗朱則肝盛克脾八九日當作滑泄瀉青色不食而為險候故不宜多也惟四肢雖多不妨以上諸症俱要疏通榮衛活血調氣健脾生胃使無干枯焦黑之患紫草消毒等味似不可少若熱甚者酒炒芩連地骨皮渴者天花粉氣虛者參耆木香大便祕者枳殼小便澀者木通食少者山楂白朮陳皮癢者桂枝脹者大腹皮厚朴肚疼者白芍藥丁香然亦看人之大小稟之虛實大而實者可救小而虛者難痊論長髮痘瘡既出之後二三日之間漸漸長髮先出者先起後出者後起肥大紅潤光澤腫胖依期灌漿無他症者吉矣若三四日內雖無他症但隱於皮膚不長髮者此元氣虛也人參透肌散參耆內托散加升麻防風前胡紫草等催之若見吐瀉口渴而不長髮者此內虛寒也陳氏木香散主之胡荽酒噴之雞冠血和酒灌之桑蠶搗爛白酒調下亦可痘出四五日雖見長起而頂獨陷者氣虛也參耆保元內托等劑加糯米主之頂陷不紅活者此血虛也四物加參耆白朮甘草主之若色雖血活根腳散大此血熱而氣不相依當涼血解毒補氣以大鼠黏子湯加紫草黃芩山楂等治若色紅而焦口乾不起發者紫草飲加紅花酒炒黃芩連翹之類治之若大便祕結內有實熱而不發者加味四聖散加枳殼黃芩及快斑散若大便利口發渴而不長髮者此內虛熱也四君子湯加肉豆蔻若不渴大便利者此內虛寒也理中湯陳氏木香散主之若夏月盛暑炎氣薰蒸煩躁發渴以致痘不起發者五苓散加木通乾葛及人參竹葉湯治之若冬月寒天為冷氣所侵致肌膚粟起而不發者當用陳氏木香散加紫蘇桔梗若鼻塞聲重咳嗽不發者此為風寒所侵人參敗毒散若氣血虛弱偶為邪穢所觸內伏或陷而不發者內用十宣散外用乳香沉香芫荽紅棗燒之以闢其氣痘瘡長髮之際五六日之間頭面多者自然腫脹目閉此正候也若應腫不腫應閉不閉此毒氣鬱留於內不能起發之故急用托裡快斑湯治之腫起者吉不腫者凶然只要痘腫不要皮肉腫又須驗其色若瘡本分顆皮色紅活者吉瘡本模糊皮色黑黯灰白者凶目雖要閉不要目胞光亮若腫後忽然平搨目開露睛者此為氣泄急用參耆內托散加川山甲糯米治之重復腫閉者吉不腫閉者凶又有痘將起發便頭面先腫大者此天行疫氣名大頭病宜解表救苦湯解之消者吉不消者凶此症易腫易消七日之後變為癢搨嗆水錯喉聲啞痰喘倒陷百無一生之理其有瘡或稀少自然灌漿頭面不腫目不閉者又不在此例大抵痘不論稀密俱要飽滿光澤頂圓高起若頂凹陷不灌漿漿不脹不膿目不閉顏色不正雖勉強灌漿於一時亦難保其十一十三朝之變也論灌漿夫痘瘡自出齊長足至六七日內放亮紅活徐徐灌漿乳食日進無雜症者當九日十日收靨脫痂自然平復此大吉矣其或唇上鼻凹天庭耳邊有痘皮薄先灌黃漿者此為賊痘毒氣內攻脾臟當於活血內托藥中加紫草連翹等藥治之此又不可概謂為急也痘出稠密色焦紫不能起頂者此血熱毒盛之故當細看其皮之厚薄厚者保元湯加紫草木通連翹桔梗當歸紅花為治若皮薄如水泡者雖灌不過半漿必有癢搨黑陷之變痘頭面稠密身上稀少顏色淡白不能起頂灌漿者此氣血虛少所致宜參耆內托散加桔梗白芷載藥力在上先灌頭面滿足然後放下若四肢不灌者前藥內倍加白朮白芍藥牛膝引之蓋四肢屬脾前藥皆脾經之藥也痘瘡五六日漿雖灌而不稠膿雖滿而不圓或頂陷者此因氣弱不能統領其血宜保元湯合四物湯加官桂治之若漿雖飽滿色見光白而不榮活者此氣盛血弱也四物湯加木香糯米主之痘瘡六七日漿雖灌不甚滿足中間又有不能灌者此氣血不和也終必變為虛寒癢搨之症宜參耆內托散加木香官桂主之痘瘡雖見脹滿但手摸則皮皺此血雖至而氣不相依後必難於收靨亦險逆相兼之症宜用參耆內托散加木香官桂糯米等治之氣虛痘瘡因用內補藥方見長起灌漿不能平滿而隨即倒榻者更用保元湯加芎歸木香官桂升麻等大劑主之此苛之症須年大能食者十活五六年小不能食者則不可治也漿雖灌而色大紅根腳漫無一線之紅圍繞者此血熱甚而未解九朝十朝當有發癢之患急宜參耆內托散保元湯加蟬退木通荊芥白芷火煅川山甲等藥治之更須令人看守勿令抓破如抓破之處鮮血淋漓則氣流通猶可施治外用敗草散或松花或炒喬麥面或伏龍肝末敷之使其重復灌漿庶亦可愈若重復灌漿而隨灌隨干其痂青白緑色堆垛如雞屎者終必咬牙寒顫危於十五六朝發渴發喘未灌漿之時而內是血也若既灌漿之後則內是膿安得又有血乎亦難以有血無血而定吉凶須以日期先後為定論可也若抓破之處肉如剝光魚皮形如湯火泡者此血為毒所滯氣為毒所壅二者俱脫是名倒陷及挖肉成坑者是名內陷俱為不治之症痘瘡八九日之內正在灌漿之時身發壯熱渴欲飲水者此必瘡多毒盛表裡氣血俱虛宜用人參黃耆甘草當歸川芎白芍麥門冬等藥或大補湯治之若飲食傷脾或傷生冷以致大便頻去或作瀉者宜用參耆山楂白朮黃耆肉桂肉豆蔻訶子澤瀉藥以止之若大便雖去飲食尚強亦還可施藥餌順序調理得獲安妥若胃弱脾虛則危矣灌漿之時十朝之外身體倦怠精神不舒煩悶嗜臥口有氣息口舌生瘡此必胃中蘊熱急用牛蒡子白朮茯苓黃連桔梗連翹薄荷煎濃汁食後徐徐服之遲則瘡雖收靨脫痂延至二十日外漸成牙齗蟲蝕生瘡時時出血謂之牙宣呼吸息出為之息露為走馬為崩砂為狐為惑為齒脫為唇爛為不治矣慎哉慎哉論觀形驗色大凡出痘當先看形貴尖圓起發瘡皮堅硬雖在稠密顆顆成珠豐厚沖滿此氣勝毒吉也若頂陷平搨皮鬆皮薄毒盛元氣凶之兆矣色貴光澤明潤紅活雖至稠密粒粒有血絲圍繞此血勝毒吉也若慘黯昏昧或赤或白根顆成片乾枯焦黑凶之兆矣灰白色者氣虛也大補氣血色赤者焦紫昏暗者血熱盛也當涼血解毒色白而漿不滿或倒搨或皮薄易破大補湯內托散主之若色焦紫而漿不滿欲成乾枯黑陷者四物湯消毒飲加紫草紅花升麻乾葛主之蓋氣和血順則痘色明潤氣弱血滯則痘色昏慘血非氣則毒不能出氣非血則毒不能化故初見紅點者毒始出也次見水泡者毒未散也繼成膿者毒將解也若色黑則毒滯血乾焦黑則氣血枯槁乃毒勢過盛非藥所能療者矣故於六日之前須看根顆無根顆者必不灌漿六日之後須看漿色無漿色者必不收靨所以昏慘而形搨陷擦破而無膿血縱有善治者亦存十一於千百耳論收靨痘瘡自八九日之後內外大勢已定漿滿氣足膿汁漸干或如蒼蠟色或如蓮肉色或如肥皂色先從人中上下口鼻兩邊收起漸漸收至頸下額上後身手足心及兩腳一齊收盡痂厚色黑逐漸脫落飲食如常大小便如故身體輕快別無他症者大吉也若漿未稠頂未滿面腫忽退目閉忽開瘡腳散闊白色皮皺乾燥似靨痂薄如紙者此因津液枯竭血氣虧敗內症未除不可誤認以為收斂而徑許其可救也其或八九日瘡尚未收目忽開腫忽退眼睛白珠紅赤痘色淡白腹脹煩悶喘渴不寧此必曾經泄瀉或過用涼藥虧損脾胃木香散異功散救之百可活其二三痘當靨之時大片潰爛膿水淋漓黏沾衣被疼痛難忍此因出痘時當發表而發表少遲毒氣停留於肌肉之間不當發表而發表太過元氣露泄衛氣不生毒火薰灼以致潰爛甚則內虛轉瀉轉利悶亂呻吟而為死候急用陳氏木香散參苓白朮散豆蔻丸以止其瀉外以敗草散或松花或炒喬麥面敷患處或用芭蕉葉襯在身下以收其毒使之徐徐自干庶亦可保若手足臂膊臀胯之間久著床席展轉擦破之處若非灌漿堅實鮮有不傷者急難成痂須皮肉潤澤膿水浸淫方有生意苟破爛成片焦乾黧黑如火燒湯潑之狀者必無生理也凡痘行漿之時宜痛不宜癢書云諸疼為實諸癢為虛外痛則內快外快則內虛若漿已收痂已結而肢體猶痛者此必發痘毒也宜活血解毒藥服之又有一種疔毒生於痘後狀如羊眼之類者內服消毒散外貼膏藥亦自漸安痘頂破膿出結聚於上如曬乾飯如碎松香不肯結痂口有熱氣胸腹飽滿悶亂不寧掀衣揭被者此必過用溫補之藥致邪氣得補反蝕正氣如火薰灼不速為清解則毒入攻心為害不淺生犀水六一散宣風散皆可選而用之也聞人氏常用豬尾膏神效特異者正此之謂也又有用涼解藥過多或冷水過多致寒濕之氣侵入脾胃停蓄壅滯水氣浸淫致腹中滑泄氣短體倦而不靨者宜除濕湯內滲其濕胃苓湯和胃安脾亦能收靨否則發癢抓破為倒搨矣其或瘡頭有孔膿水流出如天泡瘡癩頭瘡之狀或清水無膿卒然自破水出瘡干色黑則不可治矣瘡欲靨不靨其痂欲落不落當辨其寒熱虛實施治若身熱作渴飲湯此脾胃氣虛也參苓白朮散木香散六君子湯治之若身熱煩躁手足發熱欲飲冷水者此脾胃蓄熱也人參麥門冬湯主之如手足心熱日晡潮熱面赤心煩者此肝脾血虛也四物湯合逍遙散及歸脾湯主之如作渴飲冷大便祕結煩悶不安此腸胃實熱也四順飲解毒湯主之則靨收痂落更無他變矣切不可概謂氣虛而純用補藥也痘瘡日久肌肉潰爛膿血淋漓遍身手足和皮脫去腥臭不可聞者其說有二須當問其成膿而後潰爛能進飲食別無他症者但當和脾助胃避忌風寒多用伏龍肝或敗草散滲之自然平復若先未曾成膿徑自潰爛者是名倒靨不治症也今人見此概云漿臭者吉不知臭有二說有瘡乾臭者有瘡腥臭者乾臭者其瘡稠膿其痂紅紫而厚如肥皂色此吉也若腥臭者其漿清其痂或白或黃或油緑而薄間有如雞糞色者此逆也若潦漿白泡之症最忌破損若破損而赤不臭者此無陽症也可不辨哉痘先因皮薄破損多用補藥重復腫脹灌漿而不能收靨身復發熱者此正氣得補雖將邪毒驅逐為膿然正氣終為邪毒剋剝到此之時其氣又衰故不能逼逐邪氣以成痂宜大補湯倍加人參治之又有重復灌漿但膿血淋漓浸漬面目之間不能幹靨必有壞眼損鼻傷面之患宜多服犀角消毒飲升麻解毒湯若元氣本實能飲食者可愈如或出血不止膿水不幹變成疳蝕瘡名陽瘡出血者雖內服大補湯外用綿繭散敷之縱幸而得生亦難免於傷殘面目之患然終百不救一也痘痂干潤圓滿如螺螄殼最為吉兆然忽身體戰栗口作胡言或乾噦發渴煩燥者此正氣不能接濟邪氣不能禁持宜生脈散燈心湯酌用之論痘瘡首尾不可汗首尾不可下夫痘賴氣血以成終始故苟得其養無物不長苟失其養無物不消初發之時若不惡寒遍身不拘急頭不痛脈不洪大此無外感症也若妄汗之則榮衛虛肌肉開泄風邪乘間變成斑爛異症首之不可汗也若不惡食不煩躁大小便調不譫言妄語脈不沉滑此無傷食症也若妄下之則脾胃氣虛毒不能外出而反內入變成倒陷首之不可下也已出之後氣血虧損身作潮熱惕惕惡寒或頭痛四肢痠痛不思大補氣血以為傷寒惡寒也而妄用羌活防風乾葛升麻苛發表之劑或服後愈增大熱病家猶以為邪氣未盡復更一醫而重加發表若痘後胃弱不思納受脾弱不能運化毒氣不清身熱不除不思健脾養胃敗毒調元誤認以為傷食惡食而妄加克伐之劑反增嘔噦泄瀉病家或以為消導未盡復更一醫而重加利之如是二症未有不傳變而為慢驚若慢驚已成溫補回陽尚近於理若徒治其標率用天麻防風羌活全蠍殭蠶等藥牛黃丸鎮驚丹紫金錠之類大傷陰血如是夭亡非庸醫妄汗妄下者以殺之乎所以痘後最忌汗下也論痘瘡首尾當汗當下夫痘始於胎毒發於時氣類乎傷寒行乎氣血初出之時若身體壯熱頭痛鼻塞噴嚏咳嗽煩躁面赤六脈洪數者此表實熱甚也須用升麻葛根湯麻黃湯微汗以解之已出之後風邪乘虛而入致熱毒鬱而不發或寒熱往來或發驚搐或鼻流清涕或頭背身痛宜人參羌活湯敗毒散抱龍丸以和之否則熱不解而邪毒停蓄於肌肉之間不變為濕爛膿水疼痛之症者幾稀矣若將見形已見形時大便祕結身熱腹脹悶亂煩躁狂言奔走此裡實熱盛也小承氣湯四順飲加連翹利之既膿之後能食易消大便祕結發渴煩躁此血熱停滯也宜當歸芍藥湯加黃連黃芩以順之肥豬脂湯以潤之小便澀者六一散以利之否則熱毒停於腸胃之間未有不為口疳牙宣癰毒下痢症者矣豈可拘首尾不可汗首尾不可下之說而誤之耶保元湯辨人參止渴生津液和中益元氣黃耆溫肉分而實腠理補三焦而托瘡膿炙甘草之甘溫以健脾胃合藥性而不走失立此三味為保元湯固其理實其表誠確然之至論矣但以此而治虛症何施之不得若煩躁發渴引飲壯熱二便不通者可以保元湯施治乎舌心焦黑六脈沉滑夾斑疹失血發泡者可以保元湯施治乎是以治痘者須當分別寒熱虛實表裡氣血隨症處方而治療焉斯百發百中矣故苟得其人則硝硫砒豆投之而當誠中病之奇方苟非其人則雖參耆菽粟用之失宜亦皆殘生之烏喙也豈可以保元一湯而為治痘首尾之要藥哉然則博愛心鑑一書醫者當變通而酌用之耳若以溫補為是以清涼為非以保元為是以疏通為非則非豫之所敢知也豫意治痘始末莫若以理脾胃為主胃司納受脾司運化一納一運不惟氣得其正而血未必無小補矣又何必拘拘於參耆甘草之三品也哉見紅點忌用升麻辨引蔥白散手陽明之風邪引石膏止足陽明之齒痛引諸藥遊行四經升陽氣於至陰之下升麻之功誠不小也古人治斑疹已見未見痘瘡已出未出而悉用升麻葛根湯以治之者蓋欲疏通氣血因其熱而發達之俟出齊長髮之後分氣血虛實調理治療未為不善者若云見紅點忌用升麻豫不能不疑焉且痘之始出也潮熱驚悸眼目清白氣息和平飲食如故二便調停痘形疏朗大小不一作三次出此順症不必服藥升發者當以飲食湯水微發之如白酒漿芫荽鮮筍湯雄雞汁之類頻頻用之若發熱煩躁欲出不出或見而不透或透而不淨肢體倦怠腹滿氣粗不用升麻葛根等味則毒邪何由發泄元氣何以疏通若停滯於肌膚之間未有不變為蚊跡蚤斑喘滿光腫逆症者幾稀矣若依期見形顆顆點點摸之打手光澤明淨氣血沖和其毒已透其出已淨無俟人為者而妄以升麻乾葛羌活防風等藥以重表之則表虛氣泄灌漿收斂之際傳遍斑爛搨皮沾衣汙被苦痛不安者不能保其必無也大抵當發則發當表則表當汗則汗變而通之存乎人耳若曰大凡見痘紅點悉忌用升麻則非豫之所敢深信者因録之以備擇升麻葛根湯升麻乾葛白芍藥酒炒羌活甘草各等分上銼散水煎服惺惺散人參白朮白茯苓天花粉桔梗細辛甘草薄荷各等分水一鍾姜二片煎服人參調中湯人參黃耆炙甘草炙木香白芍藥酒炒陳皮隨意加減水一鍾棗一枚煎服七味豆蔻丸木香三錢肉豆蔻麵煨去油七錢半砂仁二錢龍骨火煅過五錢訶子肉五錢白礬煅過七錢赤石脂煅過七錢上共為末糊丸如粟米大三歲者五十丸量兒大小加減陳米湯送下抱龍丸天竺黃一兩膽南星二兩辰砂三錢共為末煉蜜為丸如芡實大每服一丸燈心湯或白滾湯化下參蘇飲人參紫蘇葉桔梗前胡甘草乾葛川芎陳皮防風熟半夏赤茯苓水一鍾姜二片煎五分不拘時服麻黃解表湯麻黃去節羌活防風升麻乾葛荊芥穗牛蒡子蟬退甘草桔梗水一鍾姜三片煎服參耆內托散人參黃耆當歸川芎厚朴防風桔梗白芷官桂木香隨時加減水一鍾糯米一錢參苓白朮散人參白朮白茯苓蓮肉乾山藥桔梗薏苡仁藿香乾葛肉豆蔻麵包煨去油牛黃清心丸牛黃人參神麯桂乾薑炮各一錢五分冰片麝香各五錢雄黃飛過一錢川芎茯苓柴胡桔梗炒犀角屑各二錢白朮炒黃芩炒黑豆炒阿膠炒成珠麥門冬去心杏仁去皮光各二錢五分蒲黃白芍藥炒各一兩乾山藥八錢甘草七錢金箔一百五十片羚羊角屑五錢上為細末煉蜜為丸如芡實大金箔為衣竹葉燈心湯磨化不拘時服六一散一名辰砂益元散滑石為細末水飛淨六兩甘草刮去皮炙過為細末一兩上為一處每服一二匙用涼燈心湯調下夏月井水調服加辰砂末二錢名為辰砂益元散補中益氣湯人參黃耆甘草白朮當歸升麻柴胡橘紅水一鍾姜二片棗一枚煎服理中湯人參白朮甘草乾薑煨各等分水一鍾煎服玄參解毒湯玄參黃芩山梔炒黑桔梗甘草生地荊芥穗乾葛各等分水煎服保元湯人參黃耆甘草肉桂隨意加減水一鍾糯米一錢煎服加味邊翹散連翹升麻各酒洗葛根甘草桔梗赤芍藥黃芩酒炒木通牛蒡子麥門冬去心山梔酒炒水一鍾燈心竹葉煎服四聖丹血餘一錢珍珠末三分菀豆十粒為末共為細末用油胭脂調成膏凡有痘疔將銀針挑破刮去惡血惡水後用膏點入陳皮異功散木香當歸陳皮丁香肉豆蔻麵包煨官桂人參白朮厚朴白茯苓熟半夏附子制過水一鍾姜三片棗二枚煎五分空心服四聖散紫草木通蟬退甘草一方加枳殼川芎名加味四聖散水一鍾煎服導赤散木通生地甘草各等分淡竹葉三十片水一鍾煎服犀角散犀角防風各一錢甘草五分黃連錢半水一鍾燈心竹葉煎服涼血解毒湯當歸白芷升麻紫草紅花赤芍藥桔梗連翹燈草水一鍾煎服生地四物湯生地黃當歸白芍藥川芎水一鍾煎服八物湯人參白朮茯苓甘草當歸白芍藥熟地黃川芎水一鍾煎服人參透肌散人參白芍藥川芎甘草蟬退陳皮白茯苓白朮木通紫草當歸水一鍾煎服陳皮木香散木香大腹皮赤茯苓人參前胡青皮半夏丁香訶子肉甘草桂心水一鍾煎服四君子湯人參白朮茯苓甘草水一鍾煎服五苓散白朮茯苓豬苓澤瀉各一錢肉桂三分共為細末每服一錢米湯調下煎服亦可人參敗毒散羌活獨活前胡柴胡桔梗人參茯苓枳殼甘草川芎水一鍾姜一片煎服十宣散人參當歸黃耆官桂甘草川芎防風桔梗木香白芷厚朴紫草水一鍾煎服托裡快斑湯人參當歸桔梗牛蒡子連翹防風甘草白朮赤芍藥黃耆荊芥穗各等分一方加木香水一鍾煎服解毒救苦湯升麻葛根牛蒡子桔梗天花粉地骨皮荊芥穗甘草連翹川芎黃芩紫草水一鍾煎服大補湯人參白朮茯苓甘草當歸川芎白芍藥生地黃黃耆肉桂水一鍾糯米一錢煎服內托散人參黃耆甘草當歸白芍藥酒炒陳皮川芎肉桂水一鍾糯米一錢煎服消毒飲牛蒡子甘草防風荊芥穗水一鍾煎服小承氣湯厚朴大黃枳實一方加芒硝水一鍾煎五分服穀精草散治痘後眼睛生翳穀精草一兩生蛤粉二兩上為細末用獖豬肝一葉竹刀批作片擦藥在內或麻或草縛定以砂罐貯水慢火煮熟令兒不拘時服蟬退木賊湯治症同前蟬退草一個木賊五錢水二鍾煎一鍾日逐隨意飲清肝氣黏子湯治痘後眼黑睛紅色怕日羞明欲生翳沫甘草桔梗鼠黏子連翹當歸赤芍防風荊芥蒼朮為君黃芩酒炒穀精草龍膽草水一鍾煎五分食遠服洗肝散退痘後眼翳甘草桔梗川芎木賊草決明沙苑蒺藜穀精草柴胡當歸黃芩防風水一鍾煎五分食遠服甘桔湯治痘瘡首尾喉痛甘草桔梗各等分水一鍾煎四五分食遠服射干鼠黏子湯治痘後喉痛不可忍者射干山豆根牛蒡子桔梗升麻木通燈草防風薄荷玄參水一鍾煎五分食遠服白虎湯治痘瘡熱極煩躁引飲舌上生刺睡臥不安者石膏三錢甘草一錢知母一錢五分人參一錢五分麥門冬去心一錢五分粳米二十粒水煎服淡竹葉隨意加減水楊湯浴洗瘡疹最妙水楊柳生於溪邊細條叢生者是也亦有用苑內栽培觀音柳者春冬用枝條秋夏連枝葉銼斷用長流水一鍋入楊柳枝葉在內煎六七沸將三分中一分入浴盆內不要太熱不要太冷先要用過升表藥或內托藥然後將兒浴洗漸添湯浴畢抱置溫暖處勿令見風以燈照看隱隱有起發意此佳兆也若先後不見起發不見紅綻則津液枯矣不必更洗解毒鼠黏子湯治痘後口瘡白朮於潛者佳黃連甘草桔梗鼠黏子連翹玄參薄荷防風水一鍾煎五分食遠服渣煎攪口洗瘡口瘡藥治諸瘢口瘡黃連細辛各等分為極細末先用米泔水攪淨後用藥末擦上立效散治痘疹口瘡口疳神效冰片二分干胭脂二分麝香一分珍珠三分龍骨三分血竭三分鏡秀二分兒茶三分生肌散四分外科醫家處取共為極細末先用米泔水洗攪淨後擦藥末咽下亦無妨柴胡門冬散治痘後咳嗽柴胡麥門冬去心茯苓甘草白朮乾葛陳皮半夏桑皮水一鍾姜一片煎五分食遠服敗草散用多年蓋牆屋上爛草不拘多少曬乾或烘乾為細末擦在破爛處若膿水不絶沾衣服難以坐臥可用二三升攤在席上令兒坐臥在上此草經霜露感天地陰陽之氣善解瘡毒其功不可盡述如一時不得敗草者滑石末緑豆粉喬麥面代用之亦可綿繭散治痘疳出蛾綿繭子不拘多少將生白礬捶碎入繭內令滿以炭火燒之白礬汁盡取出研細加密他僧五錢白芷末二錢和藥擦上當歸芍藥湯治痘後下痢膿血當歸芍藥枳殼黃連黃芩茯苓澤瀉陳皮牛蒡子水一鍾煎五分不拘時服千捶膏貼痘毒痘疳及一切無名腫毒神效乳香沒藥兒茶天麻仁松香各等分用槌捶三五千下成膏攤在段子上貼之四順飲治痘瘡大便祕結煩躁口渴譫言妄語大黃赤芍藥當歸各等分甘草減半水一鍾煎五六分服
